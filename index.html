<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Malla Horaria – O Boticário</title>
<style>
:root{
  --green:#1c7c54;--green-l:#27a76b;--green-d:#145c3e;--green-xl:#e8f7f0;
  --accent:#f5a623;--red:#e53e3e;--purple:#7c3aed;--indigo:#4f46e5;
  --cyan:#0891b2;--pink:#be185d;
  --bg:#f2f5f3;--border:#e0e8e4;--text:#1a2e25;--muted:#6b8077;
  --sb:#0f2a1e;--sb-h:#1c4a32;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden;font-size:12px}

/* SIDEBAR */
.sidebar{width:255px;min-width:255px;background:var(--sb);display:flex;flex-direction:column;overflow:hidden}
.sb-head{padding:16px 15px 13px;border-bottom:1px solid rgba(255,255,255,.08)}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.brand-logo{width:31px;height:31px;background:var(--green);border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:#fff;flex-shrink:0}
.brand-name{font-size:13px;font-weight:700;color:#fff;line-height:1.2}
.brand-sub{font-size:9px;color:rgba(255,255,255,.38);text-transform:uppercase;letter-spacing:.6px}
.sw{position:relative}
.sw input{width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.11);border-radius:7px;color:#fff;padding:7px 10px 7px 27px;font-size:11.5px;font-family:inherit;outline:none}
.sw input::placeholder{color:rgba(255,255,255,.28)}
.sw input:focus{border-color:var(--green-l)}
.si{position:absolute;left:9px;top:50%;transform:translateY(-50%);opacity:.35;font-size:11px;pointer-events:none}
.sb-list{flex:1;overflow-y:auto;padding:5px 0}
.sb-list::-webkit-scrollbar{width:3px}
.sb-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.09);border-radius:2px}
.rl{font-size:9px;font-weight:700;letter-spacing:1.3px;text-transform:uppercase;color:rgba(255,255,255,.26);padding:10px 15px 3px}
.ti{display:flex;align-items:center;gap:9px;padding:8px 15px;cursor:pointer;transition:background .12s}
.ti:hover{background:var(--sb-h)}.ti.active{background:var(--green)}
.td{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.18);flex-shrink:0}
.ti.active .td{background:rgba(255,255,255,.72)}
.tn{font-size:12px;color:rgba(255,255,255,.58);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ti.active .tn,.ti:hover .tn{color:rgba(255,255,255,.9)}.ti.active .tn{font-weight:600}
.tc{font-family:Consolas,monospace;font-size:9px;color:rgba(255,255,255,.2);margin-left:auto;flex-shrink:0}
.ti.active .tc{color:rgba(255,255,255,.42)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:11px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0}
.tit{font-size:15px;font-weight:700}.tsub{font-size:10px;color:var(--muted);margin-top:1px}
.topbar-r{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.df{display:flex;align-items:center;gap:5px;background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:5px 10px;font-size:11.5px;color:var(--muted)}
.df input[type=date]{border:none;background:transparent;font-size:11.5px;font-family:inherit;color:var(--text);outline:none;cursor:pointer}
.vtog{display:flex;border:1px solid var(--border);border-radius:7px;overflow:hidden}
.vb{padding:5px 11px;font-size:11px;font-family:inherit;font-weight:500;cursor:pointer;border:none;background:var(--bg);color:var(--muted);transition:all .13s}
.vb.active{background:var(--green);color:#fff}
.ebtn{padding:5px 12px;font-size:11px;font-family:inherit;font-weight:600;cursor:pointer;border:none;background:var(--green);color:#fff;border-radius:7px}
.ebtn:hover{background:var(--green-l)}

.content{flex:1;overflow:auto;padding:16px 20px}
.content::-webkit-scrollbar{width:5px;height:5px}
.content::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}

.ph{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;opacity:.4}
.ph-i{font-size:42px}.ph-t{font-size:13px;color:var(--muted)}

/* CARDS */
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-bottom:16px}
.sc{background:#fff;border-radius:9px;padding:10px 12px;border:1px solid var(--border)}
.sl{font-size:9px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:700;margin-bottom:2px}
.sv{font-size:20px;font-weight:700;font-family:Consolas,monospace}
.sc.hl .sv{color:var(--green)}.sc.rn .sv{color:var(--purple)}.sc.rnd .sv{color:var(--indigo)}
.sc.hdom .sv{color:var(--cyan)}.sc.hfes .sv{color:var(--accent)}.sc.hexor .sv{color:var(--red)}.sc.hexdf .sv{color:var(--pink)}

/* TABLE */
.tw{border-radius:10px;overflow:hidden;border:1px solid var(--border);overflow-x:auto}
table.t{width:100%;border-collapse:collapse;font-size:11px;min-width:500px}
table.t th{background:#f7faf8;border-bottom:1px solid var(--border);padding:5px 8px;text-align:center;font-weight:600;font-size:9px;color:var(--muted);white-space:nowrap}
table.t th.s0{position:sticky;left:0;z-index:3;background:#f7faf8;text-align:left;min-width:46px}
table.t th.s1{position:sticky;left:46px;z-index:3;background:#f7faf8;text-align:left;min-width:52px}
table.t th.eh{background:var(--green-xl);color:var(--green-d);border-left:2px solid var(--green);font-size:10px;font-weight:700;cursor:text}
table.t td{padding:3px 7px;border-bottom:1px solid #eef2ef;text-align:center;white-space:nowrap;vertical-align:middle}
table.t td.s0{position:sticky;left:0;background:#fff;z-index:1;font-weight:600;font-size:9.5px;color:var(--muted);width:46px;text-align:left}
table.t td.s1{position:sticky;left:46px;background:#fff;z-index:1;width:52px;text-align:left;font-weight:500;font-size:10.5px}
table.t tr:hover td{background:#f7faf8}
table.t tr:hover td.s0,table.t tr:hover td.s1{background:#f7faf8}
tr.dom td{background:#fffdf0}
tr.dom td.s0,tr.dom td.s1{background:#fffdf0}
tr.dom:hover td{background:#fffbe0}
tr.fest td{background:#fff8e0}
tr.fest td.s0,tr.fest td.s1{background:#fff8e0}
tr.fest:hover td{background:#fff3c4}
/* Festivo label in date column */
.fest-badge{display:inline-block;background:#f5a623;color:#fff;font-size:8px;font-weight:700;padding:1px 4px;border-radius:3px;margin-left:3px;vertical-align:middle}
tr.ws td{background:#ecf8f3;font-weight:700;color:var(--green-d);font-size:10.5px}
tr.ws td.s0,tr.ws td.s1{background:#ecf8f3;color:var(--green-d)}
tr.ws:hover td{background:#e0f4ea}
tr.tot td{background:var(--green-d);color:#fff;font-weight:700}
tr.tot td.s0,tr.tot td.s1{background:var(--green-d);color:#fff}

/* Editable time */
.te{display:inline-block;min-width:36px;padding:1px 3px;border-radius:3px;font-family:Consolas,monospace;font-size:10.5px;font-weight:500;cursor:text;transition:background .1s;text-align:center;color:var(--text)}
.te:hover{background:rgba(28,124,84,.1)}.te:focus{outline:2px solid var(--green);background:#fff}
.te.empty{color:#ccc}
/* Editable number */
.ne{display:inline-block;width:30px;padding:2px 2px;border-radius:3px;cursor:text;font-family:Consolas,monospace;font-size:11px;font-weight:600;text-align:center;transition:background .1s}
.ne:hover{background:rgba(28,124,84,.09)}.ne:focus{outline:2px solid var(--green);background:#fff}
/* Special pill */
.sp{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:600;cursor:pointer;white-space:nowrap}
.sp:hover{filter:brightness(.93)}
/* Nov button */
.nb{font-size:9px;margin-left:3px;opacity:.38;cursor:pointer;border-radius:3px;padding:1px 4px;color:var(--muted);transition:all .1s}
.nb:hover{background:rgba(28,124,84,.12);opacity:1}
/* Sched cell wrapper */
.sc2{display:flex;align-items:center;gap:2px;justify-content:center;min-width:100px;border-radius:5px;padding:1px 3px;transition:background .1s}
.sc2:hover{background:rgba(28,124,84,.05)}

/* DROPDOWN */
.dm{position:fixed;z-index:9999;background:#fff;border:1px solid var(--border);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.13);min-width:165px;overflow:hidden;animation:mIn .12s ease}
@keyframes mIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.dms{padding:5px 0}.dms+.dms{border-top:1px solid var(--border)}
.dml{font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);padding:4px 12px 2px}
.dmi{display:flex;align-items:center;padding:6px 13px;cursor:pointer;font-size:11.5px;transition:background .1s}
.dmi:hover{background:#f7faf8}
.dmi .mn{font-weight:500;color:var(--text)}
.dmi.act .mn{color:var(--green);font-weight:700}
.dmi.act::after{content:'✓';margin-left:auto;color:var(--green);font-weight:700}
.dcl{padding:6px 13px;color:var(--red);font-size:11px;cursor:pointer}
.dcl:hover{background:#fff5f5}

.c-hl{color:var(--green)}.c-rn{color:var(--purple)}.c-rnd{color:var(--indigo)}
.c-hdom{color:var(--cyan)}.c-hfes{color:var(--accent)}.c-hexor{color:var(--red)}.c-hexdf{color:var(--pink)}
.dash{color:#ddd}
.ediv{border-left:2px solid var(--green-xl)}

/* EMP VIEW */
.ecg{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.ec{background:#fff;border-radius:10px;border:1px solid var(--border);overflow:hidden}
.ech{background:var(--green-xl);padding:9px 13px;display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--border)}
.eav{width:30px;height:30px;border-radius:50%;background:var(--green);color:#fff;font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ecn{font-size:12px;font-weight:700;color:var(--green-d)}.ecr{font-size:9.5px;color:var(--muted)}
.ekp{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border)}
.ek{background:#fff;padding:8px 6px;text-align:center}
.ekl{font-size:8px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);font-weight:600;margin-bottom:1px}
.ekv{font-size:17px;font-weight:700;font-family:Consolas,monospace}
.edays{padding:9px 13px;max-height:240px;overflow-y:auto}
.edr{display:flex;align-items:center;gap:7px;padding:3px 0;border-bottom:1px solid #f2f5f3;font-size:10.5px}
.edr:last-child{border-bottom:none}
.edl{width:28px;font-weight:600;color:var(--muted);flex-shrink:0;font-size:9.5px}
.edd{width:46px;color:var(--muted);flex-shrink:0;font-size:9.5px}
.eds{font-family:Consolas,monospace;font-size:10px;font-weight:500;flex:1}
.bgs{display:flex;gap:3px;flex-wrap:wrap}
.bg{font-size:8.5px;font-family:Consolas,monospace;padding:1px 4px;border-radius:3px;font-weight:700}
.bg.rn{background:#f3eeff;color:var(--purple)}.bg.rnd{background:#eeeffe;color:var(--indigo)}
.bg.hdom{background:#e0f6fc;color:var(--cyan)}.bg.hfes{background:#fff7e0;color:#92570a}
.bg.hexor{background:#ffe5e5;color:var(--red)}.bg.hexdf{background:#fce7f3;color:var(--pink)}

.hint{font-size:9.5px;color:var(--muted);padding:7px 0 3px}
</style>

</script>
</head>

<div class="sidebar">
  <div class="sb-head">
    <div class="brand">
      <div class="brand-logo">B</div>
      <div><div class="brand-name">O Boticário</div><div class="brand-sub">Malla Horaria 2026</div></div>
    </div>
    <div class="sw">
      <span class="si">🔍</span>
      <input type="text" id="srch" placeholder="Buscar tienda..." oninput="buildSB(this.value)">

  <div class="sb-list" id="sbList"></div>
</div>

<div class="main">
  <div class="topbar">
    <div><span id="saveStatus" style="font-size:10px;color:var(--green);margin-right:10px;transition:opacity .5s;opacity:0"></span><div class="tit" id="topT">Selecciona una tienda</div><div class="tsub" id="topS">Malla horaria · Liquidación de horas</div></div>
    <div class="topbar-r">
      <div class="df">📅
        <input type="date" id="dfrom" value="2026-03-01" onchange="render()"> →
        <input type="date" id="dto" value="2026-03-31" onchange="render()">
      </div>
      <div class="vtog">
        <button class="vb active" id="btnM" onclick="setView('malla')">📋 Malla</button>
        <button class="vb" id="btnA" onclick="setView('asesores')">👤 Por asesor</button>
      </div>
      <button class="ebtn" onclick="exportCSV()">⬇ CSV</button>
    </div>
  </div>
  <div class="content" id="cnt">
    <div class="ph"><div class="ph-i">📋</div><div class="ph-t">Selecciona una tienda</div></div>
  </div>
</div>

/* ── CALENDAR UTILS ── */
function isoWeek(d) {
  // Returns ISO week number
  const jan4 = new Date(d.getFullYear(), 0, 4);
  const startOfWeek1 = new Date(jan4);
  startOfWeek1.setDate(jan4.getDate() - (jan4.getDay() || 7) + 1);
  const diff = d - startOfWeek1;
  return Math.floor(diff / (7 * 86400000)) + 1;
}

function dateStr(d) {
  return d.toISOString().slice(0, 10);
}

function parseDateStr(s) {
  const [y, m, d] = s.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function fmtDisplay(s) {
  if (!s) return '';
  const [y, m, d] = s.split('-');
  return `${d}/${m}`;
}

// Build array of weeks between two date strings (inclusive)
// Each week: { weekNum, days: [{date, dayIdx (0=Mon..6=Sun), label}] }
function buildCalendar(fromStr, toStr) {
  const from = parseDateStr(fromStr);
  const to = parseDateStr(toStr);
  const weeks = [];
  let current = new Date(from);

  while (current <= to) {
    const wn = isoWeek(current);
    let week = weeks.find(w => w.weekNum === wn && w.year === current.getFullYear());
    if (!week) {
      week = { weekNum: wn, year: current.getFullYear(), days: [] };
      weeks.push(week);
    }
    const dayIdx = (current.getDay() + 6) % 7; // 0=Mon..6=Sun
    week.days.push({
      date: dateStr(current),
      dayIdx,
      label: DAY_ES[dayIdx],
      isDom: dayIdx === 6,
      isFest: FESTIVOS_2026.has(dateStr(current))
    });
    current.setDate(current.getDate() + 1);
  }
  return weeks;
}

/* ── SCHED ACCESS ── */
function getEmp(tiendaCode, date, empIdx) {
  if (!SCHED[tiendaCode]) SCHED[tiendaCode] = {};
  if (!SCHED[tiendaCode][date]) SCHED[tiendaCode][date] = {};
  if (!SCHED[tiendaCode][date][empIdx]) SCHED[tiendaCode][date][empIdx] = {ap:'',ci:'',hl:'',rn:'',rnd:'',hdom:'',hfes:'',hexor:'',hexdf:''};
  return SCHED[tiendaCode][date][empIdx];
}

function setEmp(tiendaCode, date, empIdx, field, val) {
  getEmp(tiendaCode, date, empIdx)[field] = val;
}

function getEmpName(tiendaCode, empIdx) {
  if (EMP_NAMES[tiendaCode] && EMP_NAMES[tiendaCode][empIdx] !== undefined)
    return EMP_NAMES[tiendaCode][empIdx];
  const raw = (CATALOG[tiendaCode]?.employees || [])[empIdx] || `Asesor ${empIdx + 1}`;
  return raw.replace(/GERENTE 1\s*/i,'').replace(/GERENTE I\s*/i,'').replace(/ASESORA?\s*\d+\s*/i,'').replace(/Asesor\s*\d+\s*/i,'').trim() || raw.split(' ').slice(0,2).join(' ');
}

/* ── HOUR CALC ── */
function parseTime(s) {
  if (!s || typeof s !== 'string') return null;
  const m = s.trim().match(/^(\d{1,2}):(\d{2})$/);
  if (!m) return null;
  return parseInt(m[1]) * 60 + parseInt(m[2]);
}

function calcHours(ap, ci, dateStr) {
  const a = parseTime(ap), c = parseTime(ci);
  if (a === null || c === null) return null;
  let diff = c - a; if (diff <= 0) diff += 24 * 60;
  const hl = Math.floor(diff / 60);
  let rn = 0;
  const se = c <= a ? c + 24 * 60 : c;
  const os = Math.max(a, 21 * 60), oe = Math.min(se, 30 * 60);
  if (oe > os) rn = Math.round((oe - os) / 60);
  const festivo = isFestivo(dateStr);
  const domingo = isDomingo(dateStr);
  return {
    hl,
    rn,
    hdom: domingo && !festivo ? hl : 0,  // dominical solo si NO es festivo
    hfes: festivo ? hl : 0,              // festivo (incluye domingos festivos)
    rnd: (domingo || festivo) ? rn : 0,  // recargo nocturno dom/fes
  };
}

function getSpecKey(v) {
  if (!v) return null;
  for (const s of SPEC) if (v.toLowerCase().includes(s.toLowerCase())) return s;
  return null;
}

function n(v) { return v === '' || v === null || v === undefined ? 0 : Number(v) || 0; }

/* ── ACTIVE EMPLOYEES (first 5 with any name) ── */
function activeEmps(tiendaCode) {
  const emps = CATALOG[tiendaCode]?.employees || [];
  const idx = [];
  for (let e = 0; e < 10 && idx.length < 5; e++) {
    const name = emps[e] || '';
    if (name && !['ASESOR 3','ASESOR 4','ASESOR 5','ASESOR 6','ASESOR 7','ASESOR 8','ASESOR 9'].includes(name.trim().toUpperCase()))
      idx.push(e);
    else if (idx.length === 0 || e < 3)
      idx.push(e); // always include first 3
  }
  // Deduplicate, max 5
  return [...new Set(idx)].slice(0, 5);
}

/* ── TOTALS ── */
function calcTotals(tiendaCode, empIdx, df, dt) {
  const tot = {};
  empIdx.forEach(e => { tot[e] = {hl:0,rn:0,rnd:0,hdom:0,hfes:0,hexor:0,hexdf:0}; });
  if (!SCHED[tiendaCode]) return tot;
  Object.entries(SCHED[tiendaCode]).forEach(([date, dayData]) => {
    if (date < df || date > dt) return;
    empIdx.forEach(e => {
      const emp = dayData[e];
      if (!emp) return;
      if (getSpecKey(emp.ap)) return; // special days have no hours
      tot[e].hl  += n(emp.hl);  tot[e].rn  += n(emp.rn);  tot[e].rnd += n(emp.rnd);
      tot[e].hdom+= n(emp.hdom);tot[e].hfes+= n(emp.hfes);tot[e].hexor+=n(emp.hexor);tot[e].hexdf+=n(emp.hexdf);
    });
  });
  return tot;
}

function storeTot(tiendaCode, empIdx, df, dt) {
  const et = calcTotals(tiendaCode, empIdx, df, dt);
  const t = {hl:0,rn:0,rnd:0,hdom:0,hfes:0,hexor:0,hexdf:0};
  empIdx.forEach(e => { for (const k of Object.keys(t)) t[k] += et[e][k]; });
  return t;
}

/* ── SIDEBAR ── */
function buildSB(f = '') {
  const c = document.getElementById('sbList');
  const byR = {};
  Object.entries(CATALOG).forEach(([code, t]) => {
    const r = t.region;
    if (!byR[r]) byR[r] = [];
    if (!f || t.name.toLowerCase().includes(f.toLowerCase()) || code.includes(f))
      byR[r].push({ code: parseInt(code), name: t.name, key: code });
  });
  let h = '';
  ['Region 1','Region 2','Region 3','Region 4'].forEach(r => {
    const it = byR[r]; if (!it || !it.length) return;
    it.sort((a, b) => a.name.localeCompare(b.name));
    h += `<div class="rl">${r.replace('Region','Región')}</div>`;
    it.forEach(t => {
      h += `<div class="ti ${sel == t.key ? 'active' : ''}" onclick="selT('${t.key}')">
        <div class="td"></div><div class="tn">${t.name}</div><div class="tc">${t.code}</div></div>`;
    });
  });
  c.innerHTML = h;
}

let menuCtx = null;

function openNovMenu(e, date, empIdx) {
  e.stopPropagation();
  const emp = getEmp(sel, date, empIdx);
  const sk = getSpecKey(emp.ap);
  menuCtx = { date, empIdx };

  const menu = document.getElementById('dropMenu');
  menu.innerHTML = `
    <div class="dms">
      <div class="dml">Novedad del día</div>
      ${SPEC.map(s => `
        <div class="dmi ${sk === s ? 'act' : ''}" onclick="selectSpec('${s}')">
          <span class="mn">${s}</span>
        </div>`).join('')}
    </div>
    <div class="dms"><div class="dcl" onclick="clearNov()">Limpiar novedad</div></div>`;

  const rect = e.target.getBoundingClientRect();
  let top = rect.bottom + 4, left = rect.left;
  if (top + 320 > window.innerHeight) top = rect.top - 320 - 4;
  if (left + 175 > window.innerWidth) left = window.innerWidth - 180;
  menu.style.top = top + 'px'; menu.style.left = left + 'px'; menu.style.display = 'block';
}

function closeMenu() { document.getElementById('dropMenu').style.display = 'none'; menuCtx = null; }

function selectSpec(key) {
  if (!menuCtx) return;
  const { date, empIdx } = menuCtx;
  const emp = getEmp(sel, date, empIdx);
  emp.ap = key; emp.ci = key;
  emp.hl = ''; emp.rn = ''; emp.rnd = ''; emp.hdom = ''; emp.hfes = ''; emp.hexor = ''; emp.hexdf = '';
  refreshCell(date, empIdx); updateCards(); closeMenu();
}

function clearNov() {
  if (!menuCtx) return;
  const { date, empIdx } = menuCtx;
  const emp = getEmp(sel, date, empIdx);
  emp.ap = ''; emp.ci = '';
  refreshCell(date, empIdx); closeMenu();
}

}

function refreshCell(date, empIdx) {
  const cell = document.querySelector(`.sc2[data-date="${date}"][data-emp="${empIdx}"]`);
  if (cell) cell.innerHTML = buildCellContent(date, empIdx);
  // refresh number cells
  const emp = getEmp(sel, date, empIdx);
  const sk = getSpecKey(emp.ap);
  ['hl','rn','rnd','hdom','hfes','hexor','hexdf'].forEach(f => {
    const el = document.querySelector(`.ne[data-date="${date}"][data-emp="${empIdx}"][data-field="${f}"]`);
    if (!el) return;
    if (sk) { el.textContent = '–'; el.style.opacity = '.25'; el.style.pointerEvents = 'none'; }
    else { el.style.opacity = '1'; el.style.pointerEvents = 'auto'; el.textContent = emp[f] || '–'; }
  });
}

/* ── TIME EDIT ── */
function timeKey(e, el) {
  if (e.key === 'Enter') { e.preventDefault(); el.blur(); }
  if (e.key === 'Escape') { el.textContent = el.dataset.orig || '--:--'; el.blur(); }
  if (e.key === 'Tab') { e.preventDefault(); el.blur(); }
}

function commitTime(el) {
  const { date, emp: empIdx, field, orig } = el.dataset;
  let val = el.textContent.trim();
  if (val === '--:--' || val === '') val = '';
  el.dataset.orig = val;
  el.classList.toggle('empty', !val);
  if (!val) el.textContent = '--:--';

  const emp = getEmp(sel, date, parseInt(empIdx));
  emp[field] = val;

  const calc = calcHours(emp.ap, emp.ci, date);
  if (calc) {
    emp.hl = calc.hl; emp.rn = calc.rn;
    emp.hdom = calc.hdom > 0 ? calc.hdom : '';
    emp.hfes = calc.hfes > 0 ? calc.hfes : '';
    emp.rnd  = calc.rnd  > 0 ? calc.rnd  : '';
    ['hl','rn','hdom','hfes','rnd'].forEach(f => {
      const nel = document.querySelector(`.ne[data-date="${date}"][data-emp="${empIdx}"][data-field="${f}"]`);
      if (nel) nel.textContent = emp[f] || '–';
    });
  }
  updateCards();
}

/* ── NUM EDIT ── */
function commitNum(el) {
  const { date, emp: empIdx, field } = el.dataset;
  let val = el.textContent.trim();
  if (val === '–' || val === '') val = '';
  el.dataset.orig = val;
  const emp = getEmp(sel, date, parseInt(empIdx));
  emp[field] = val === '' ? '' : (isNaN(val) ? val : Number(val));
  updateCards();
}

function numKey(e, el) {
  if (e.key === 'Enter') { e.preventDefault(); el.blur(); }
  if (e.key === 'Escape') { el.textContent = el.dataset.orig || '–'; el.blur(); }
}

function neEl(date, empIdx, field, cls) {
  const emp = getEmp(sel, date, empIdx);
  const sk = getSpecKey(emp.ap);
  const v = emp[field];
  const dim = sk ? 'style="opacity:.25;pointer-events:none"' : '';
  return `<span class="ne ${cls}" contenteditable="true"
    data-date="${date}" data-emp="${empIdx}" data-field="${field}" data-orig="${v || ''}"
    onblur="commitNum(this)" onkeydown="numKey(event,this)" ${dim}>${v || '–'}</span>`;
}

/* ── UPDATE CARDS ── */
function updateCards() {
  if (!sel) return;
  const ei = activeEmps(sel);
  const df = document.getElementById('dfrom').value;
  const dt = document.getElementById('dto').value;
  const t = storeTot(sel, ei, df, dt);
  ['hl','rn','rnd','hdom','hfes','hexor','hexdf'].forEach((k, i) => {
    const el = document.getElementById('c-' + k);
    if (el) el.textContent = [t.hl,t.rn,t.rnd,t.hdom,t.hfes,t.hexor,t.hexdf][i];
  });
  // Refresh total row
  const et = calcTotals(sel, ei, df, dt);
  ei.forEach(e => {
    ['hl','rn','rnd','hdom','hfes','hexor','hexdf'].forEach(f => {
      const el = document.querySelector(`.ne.tot[data-emp="${e}"][data-field="${f}"]`);
      if (el) el.textContent = et[e][f] || 0;
    });
  });
}

/* ── RENDER ── */
function render() {
  const cnt = document.getElementById('cnt');
  if (!sel) {
    cnt.innerHTML = `<div class="ph"><div class="ph-i">📋</div><div class="ph-t">Selecciona una tienda</div></div>`;
    return;
  }
  const tienda = CATALOG[sel];
  document.getElementById('topT').textContent = tienda.name;
  document.getElementById('topS').textContent = `CECO ${sel} · ${tienda.region.replace('Region','Región')} · Liquidación de horas`;

  const df = document.getElementById('dfrom').value;
  const dt = document.getElementById('dto').value;
  const ei = activeEmps(sel);
  const t = storeTot(sel, ei, df, dt);

  const cards = `<div class="sg">
    <div class="sc hl"><div class="sl">HL Total</div><div class="sv" id="c-hl">${t.hl}</div></div>
    <div class="sc rn"><div class="sl">Rec. Noct.</div><div class="sv" id="c-rn">${t.rn}</div></div>
    <div class="sc rnd"><div class="sl">RN Dom/Fes</div><div class="sv" id="c-rnd">${t.rnd}</div></div>
    <div class="sc hdom"><div class="sl">H. Dominic.</div><div class="sv" id="c-hdom">${t.hdom}</div></div>
    <div class="sc hfes"><div class="sl">H. Festivas</div><div class="sv" id="c-hfes">${t.hfes}</div></div>
    <div class="sc hexor"><div class="sl">Extras Ord.</div><div class="sv" id="c-hexor">${t.hexor}</div></div>
    <div class="sc hexdf"><div class="sl">Extras DF</div><div class="sv" id="c-hexdf">${t.hexdf}</div></div>
  </div>`;

  cnt.innerHTML = cards + (view === 'asesores' ? renderEmp(ei, df, dt) : renderMalla(ei, df, dt));
}

function renderMalla(empIdx, df, dt) {
  const calendar = buildCalendar(df, dt);

  // Employee headers — editable names
  const ehRow = empIdx.map(e => {
    const name = getEmpName(sel, e);
    return `<th colspan="8" class="eh">
      <span contenteditable="true" data-emp="${e}"
        onblur="saveName(this)" onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}"
        style="outline:none;cursor:text;display:block">${name}</span></th>`;
  }).join('');

  const subRow = empIdx.map(() => `
    <th class="ediv c-hl">Horario</th>
    <th class="c-hl">HL</th><th class="c-rn">RN</th><th class="c-rnd">RND</th>
    <th class="c-hdom">HDom</th><th class="c-hfes">HFes</th>
    <th class="c-hexor">ExOr</th><th class="c-hexdf">ExDF</th>`).join('');

  let body = '';
  const wst_local = {};

  calendar.forEach(week => {
    const wid = `w${week.year}w${week.weekNum}`;
    // Week summary row — calculated dynamically
    const wTot = {};
    empIdx.forEach(e => { wTot[e] = {hl:0,rn:0,rnd:0,hdom:0,hfes:0,hexor:0,hexdf:0}; });
    week.days.forEach(day => {
      empIdx.forEach(e => {
        const emp = getEmp(sel, day.date, e);
        if (getSpecKey(emp.ap)) return;
        wTot[e].hl   += n(emp.hl);   wTot[e].rn   += n(emp.rn);   wTot[e].rnd  += n(emp.rnd);
        wTot[e].hdom += n(emp.hdom); wTot[e].hfes += n(emp.hfes); wTot[e].hexor+= n(emp.hexor); wTot[e].hexdf+= n(emp.hexdf);
      });
    });
    const sumCells = empIdx.map(e => { const w = wTot[e]; return `
      <td class="ediv"></td>
      <td class="c-hl">${w.hl||'–'}</td><td class="c-rn">${w.rn||'–'}</td><td class="c-rnd">${w.rnd||'–'}</td>
      <td class="c-hdom">${w.hdom||'–'}</td><td class="c-hfes">${w.hfes||'–'}</td>
      <td class="c-hexor">${w.hexor||'–'}</td><td class="c-hexdf">${w.hexdf||'–'}</td>`; }).join('');

    // Week label: S9 (01/03 – 08/03)
    const firstDay = week.days[0], lastDay = week.days[week.days.length-1];
    const wLabel = `S${week.weekNum}`;
    body += `<tr class="ws" onclick="twk('${wid}')" style="cursor:pointer" id="wrow-${wid}">
      <td class="s0">${wLabel}</td>
      <td class="s1"><span style="font-size:8.5px;opacity:.55" id="ar-${wid}">▼ días</span></td>
      ${sumCells}</tr>`;

    // Day rows
    week.days.forEach(day => {
      const dayCells = empIdx.map(e => {
        const emp = getEmp(sel, day.date, e);
        const sk = getSpecKey(emp.ap);
        if (sk) {
          return `<td class="ediv" colspan="8" style="text-align:left;padding-left:10px">
            <div class="sc2" data-date="${day.date}" data-emp="${e}">
              ${buildCellContent(day.date, e)}
            </div>
            ${['hl','rn','rnd','hdom','hfes','hexor','hexdf'].map(f=>`<span class="ne" style="display:none" data-date="${day.date}" data-emp="${e}" data-field="${f}" data-orig="" onblur="commitNum(this)" onkeydown="numKey(event,this)"></span>`).join('')}
          </td>`;
        }
        return `<td class="ediv" style="min-width:110px">
          <div class="sc2" data-date="${day.date}" data-emp="${e}">
            ${buildCellContent(day.date, e)}
          </div>
        </td>
        <td>${neEl(day.date, e, 'hl', 'c-hl')}</td>
        <td>${neEl(day.date, e, 'rn', 'c-rn')}</td>
        <td>${neEl(day.date, e, 'rnd', 'c-rnd')}</td>
        <td>${neEl(day.date, e, 'hdom', 'c-hdom')}</td>
        <td>${neEl(day.date, e, 'hfes', 'c-hfes')}</td>
        <td>${neEl(day.date, e, 'hexor', 'c-hexor')}</td>
        <td>${neEl(day.date, e, 'hexdf', 'c-hexdf')}</td>`;
      }).join('');

      const isFest = isFestivo(day.date);
      const rowClass = isFest ? 'fest' : (day.isDom ? 'dom' : '');
      body += `<tr class="week-${wid} ${rowClass}">
        <td class="s0">${day.label}</td>
        <td class="s1">${fmtDisplay(day.date)}${isFestivo(day.date)?'<span class="fest-badge">F</span>':''}</td>
        ${dayCells}</tr>`;
    });
  });

  // TOTAL row
  const et = calcTotals(sel, empIdx, df, dt);
  const totRow = empIdx.map(e => `
    <td class="ediv"></td>
    <td><span class="ne tot" data-emp="${e}" data-field="hl">${et[e].hl||0}</span></td>
    <td><span class="ne tot" data-emp="${e}" data-field="rn">${et[e].rn||0}</span></td>
    <td><span class="ne tot" data-emp="${e}" data-field="rnd">${et[e].rnd||0}</span></td>
    <td><span class="ne tot" data-emp="${e}" data-field="hdom">${et[e].hdom||0}</span></td>
    <td><span class="ne tot" data-emp="${e}" data-field="hfes">${et[e].hfes||0}</span></td>
    <td><span class="ne tot" data-emp="${e}" data-field="hexor">${et[e].hexor||0}</span></td>
    <td><span class="ne tot" data-emp="${e}" data-field="hexdf">${et[e].hexdf||0}</span></td>`).join('');
  body += `<tr class="tot"><td class="s0">TOTAL</td><td class="s1">Tienda</td>${totRow}</tr>`;

  return `<div class="hint">Click en el horario para editar · ≡ para marcar novedad · Click en nombre para renombrar</div>
  <div class="tw"><table class="t">
    <thead>
      <tr><th class="s0" rowspan="2">Sem.</th><th class="s1" rowspan="2">Fecha</th>${ehRow}</tr>
      <tr>${subRow}</tr>
    </thead>
    <tbody>${body}</tbody>
  </table></div>`;
}

function renderEmp(empIdx, df, dt) {
  const et = calcTotals(sel, empIdx, df, dt);
  const calendar = buildCalendar(df, dt);
  const allDays = calendar.flatMap(w => w.days);

  return `<div class="ecg">${empIdx.map(e => {
    const name = getEmpName(sel, e);
    const t = et[e];
    const ini = name.split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase();
    const dH = allDays.map(day => {
      const emp = getEmp(sel, day.date, e);
      if (!emp.ap && !emp.hl) return '';
      const sk = getSpecKey(emp.ap);
      const bgs = [
        emp.rn&&n(emp.rn)?`<span class="bg rn">RN:${emp.rn}</span>`:'',
        emp.rnd&&n(emp.rnd)?`<span class="bg rnd">RND:${emp.rnd}</span>`:'',
        emp.hdom&&n(emp.hdom)?`<span class="bg hdom">Dom:${emp.hdom}</span>`:'',
        emp.hfes&&n(emp.hfes)?`<span class="bg hfes">Fes:${emp.hfes}</span>`:'',
        emp.hexor&&n(emp.hexor)?`<span class="bg hexor">ExOr:${emp.hexor}</span>`:'',
        emp.hexdf&&n(emp.hexdf)?`<span class="bg hexdf">ExDF:${emp.hexdf}</span>`:'',
      ].filter(Boolean).join('');
      const sc = sk ? `<span class="eds" style="${PILL[sk]||''};padding:1px 7px;border-radius:10px;font-family:inherit;font-size:9.5px">${sk}</span>`
        : emp.ap && emp.ci ? `<span class="eds">${emp.ap}→${emp.ci}</span>` : '';
      if (!sc && !bgs) return '';
      const festBadge = isFestivo(day.date) ? '<span class="fest-badge">F</span>' : '';
      return `<div class="edr"><span class="edl">${day.label}</span><span class="edd">${fmtDisplay(day.date)}${festBadge}</span>${sc}<div class="bgs">${bgs}</div></div>`;
    }).filter(Boolean).join('');

    return `<div class="ec">
      <div class="ech"><div class="eav">${ini}</div><div><div class="ecn">${name}</div><div class="ecr">Asesor</div></div></div>
      <div class="ekp">
        <div class="ek"><div class="ekl">HL</div><div class="ekv c-hl">${t.hl}</div></div>
        <div class="ek"><div class="ekl">RN</div><div class="ekv c-rn">${t.rn}</div></div>
        <div class="ek"><div class="ekl">Extras</div><div class="ekv c-hexor">${t.hexor+t.hexdf}</div></div>
        <div class="ek"><div class="ekl">Dom+Fes</div><div class="ekv c-hdom">${t.hdom+t.hfes}</div></div>
      </div>
      <div class="edays">${dH||'<div style="padding:12px;color:var(--muted);font-size:10.5px;text-align:center">Sin actividad en el período</div>'}</div>
    </div>`;
  }).join('')}</div>`;
}

function saveName(el) {
  const ei = parseInt(el.dataset.emp);
  if (!EMP_NAMES[sel]) EMP_NAMES[sel] = {};
  EMP_NAMES[sel][ei] = el.textContent.trim();
}

const wst = {};
function twk(id) {
  wst[id] = !wst[id];
  document.querySelectorAll(`.week-${id}`).forEach(el => el.style.display = wst[id] ? 'none' : '');
  const a = document.getElementById(`ar-${id}`);
  if (a) a.textContent = wst[id] ? '▶ días' : '▼ días';
}

function exportCSV() {
  if (!sel) return;
  const ei = activeEmps(sel);
  const df = document.getElementById('dfrom').value, dt = document.getElementById('dto').value;
  const hdr = ['Día','Fecha'];
  ei.forEach(e => {
    const nm = getEmpName(sel, e).replace(/[,;]/g, ' ');
    ['Horario','HL','RN','RND','HDom','HFes','ExOr','ExDF'].forEach(h => hdr.push(`${nm}_${h}`));
  });
  const rows = [hdr.join(',')];
  const cal = buildCalendar(df, dt);
  cal.flatMap(w => w.days).forEach(day => {
    const cols = [day.label, day.date];
    ei.forEach(e => {
      const emp = getEmp(sel, day.date, e);
      const sk = getSpecKey(emp.ap);
      [sk || `${emp.ap||''}→${emp.ci||''}`, sk?'':emp.hl, sk?'':emp.rn, emp.rnd, emp.hdom, emp.hfes, emp.hexor, emp.hexdf]
        .forEach(v => cols.push(String(v || '').replace(/,/g, '')));
    });
    rows.push(cols.join(','));
  });
  const blob = new Blob([rows.join('\n')], {type:'text/csv'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `malla_${CATALOG[sel].name.replace(/\s/g,'_')}.csv`; a.click();
}

document.addEventListener('click', e => {
  const m = document.getElementById('dropMenu');
  if (m.style.display !== 'none' && !m.contains(e.target)) closeMenu();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeMenu(); });

buildSB();

// ── FIREBASE SYNC ──
let unsubscribe = null;
let saveTimer = null;

function waitFirebase(cb) {
  if (window._firebaseReady) cb();
  else window.addEventListener('firebaseReady', cb, { once: true });
}

// Save to Firestore with debounce (500ms after last edit)
function scheduleSave() {
  if (!sel) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => saveToFirebase(sel), 500);
}

async function saveToFirebase(tiendaCode) {
  if (!window._db) return;
  const { doc, setDoc } = window._firestoreFns;
  const data = SCHED[tiendaCode] || {};
  const empNames = EMP_NAMES[tiendaCode] || {};
  try {
    await setDoc(doc(window._db, 'malla', String(tiendaCode)), {
      sched: JSON.stringify(data),
      empNames: JSON.stringify(empNames),
      updatedAt: Date.now()
    });
    showSaveStatus('✓ Guardado');
  } catch(e) {
    showSaveStatus('⚠ Error al guardar');
    console.error(e);
  }
}

function showSaveStatus(msg) {
  let el = document.getElementById('saveStatus');
  if (!el) return;
  el.textContent = msg;
  el.style.opacity = '1';
  setTimeout(() => el.style.opacity = '0', 2000);
}

// Subscribe to real-time changes for selected tienda
function subscribeToTienda(tiendaCode) {
  if (unsubscribe) { unsubscribe(); unsubscribe = null; }
  if (!window._db) { waitFirebase(() => subscribeToTienda(tiendaCode)); return; }
  const { doc, onSnapshot } = window._firestoreFns;
  unsubscribe = onSnapshot(doc(window._db, 'malla', String(tiendaCode)), (snap) => {
    if (snap.exists()) {
      const d = snap.data();
      if (d.sched) {
        const incoming = JSON.parse(d.sched);
        // Merge into SCHED without overwriting local pending saves
        if (!SCHED[tiendaCode]) SCHED[tiendaCode] = {};
        Object.assign(SCHED[tiendaCode], incoming);
      }
      if (d.empNames) {
        const names = JSON.parse(d.empNames);
        if (!EMP_NAMES[tiendaCode]) EMP_NAMES[tiendaCode] = {};
        Object.assign(EMP_NAMES[tiendaCode], names);
      }
      // Re-render if this is the currently selected tienda
      if (sel == tiendaCode) render();
    }
    showSaveStatus('● En línea');
  }, (err) => {
    showSaveStatus('⚠ Sin conexión');
  });
}

// Hook into selT to subscribe
const _origSelT = selT;
window.selT = function(code) {
  _origSelT(code);
  subscribeToTienda(code);
};

// Hook into updateCards to also save
const _origUpdateCards = updateCards;
window.updateCards = function() {
  _origUpdateCards();
  scheduleSave();
};

// Hook into saveName to also save
const _origSaveName = saveName;
window.saveName = function(el) {
  _origSaveName(el);
  scheduleSave();
};

// Init: if a tienda is already selected, subscribe
waitFirebase(() => {
  showSaveStatus('● En línea');
  if (sel) subscribeToTienda(sel);
});

</script>
