<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Malla Horaria – O Boticário</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<style>
/* ══════════════════════════════════════════════
   DESIGN SYSTEM — O Boticário · Malla Horaria
   Font: Outfit (headings + body) · JetBrains Mono (data)
   Palette: Forest Green + Warm Neutrals
   ══════════════════════════════════════════════ */
:root{
  --green:#1a7a52;--green-l:#22a06b;--green-d:#0e5c3a;--green-xl:#e6f9f0;
  --accent:#e8972f;--red:#dc3545;--purple:#8b5cf6;--indigo:#6366f1;
  --cyan:#0ea5c9;--pink:#d63384;
  --bg:#f5f7f6;--bg-warm:#fafbfa;--border:#dfe6e1;--text:#162b21;--muted:#7a9488;
  --sb:#0c1f16;--sb-h:#183d2a;
  --shadow-sm:0 1px 3px rgba(14,40,26,.06),0 1px 2px rgba(14,40,26,.04);
  --shadow-md:0 4px 14px rgba(14,40,26,.08),0 2px 6px rgba(14,40,26,.04);
  --shadow-lg:0 10px 30px rgba(14,40,26,.1),0 4px 10px rgba(14,40,26,.04);
  --radius:10px;--radius-lg:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden;font-size:12.5px;-webkit-font-smoothing:antialiased}

/* ── SIDEBAR ── */
.sidebar{width:260px;min-width:260px;background:var(--sb);display:flex;flex-direction:column;overflow:hidden;border-right:1px solid rgba(255,255,255,.04)}
.sb-head{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,.06);background:linear-gradient(180deg,rgba(26,122,82,.12) 0%,transparent 100%)}
.brand{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.brand-logo{width:36px;height:36px;background:linear-gradient(135deg,var(--green) 0%,var(--green-l) 100%);border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;color:#fff;flex-shrink:0;box-shadow:0 2px 8px rgba(26,122,82,.35)}
.brand-name{font-size:14px;font-weight:700;color:#fff;line-height:1.2;letter-spacing:-.2px}
.brand-sub{font-size:9px;color:rgba(255,255,255,.32);text-transform:uppercase;letter-spacing:1.2px;font-weight:500;margin-top:1px}
.sw{position:relative}
.sw input{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:8px;color:#fff;padding:9px 12px 9px 32px;font-size:12px;font-family:'Outfit',sans-serif;outline:none;transition:all .2s}
.sw input::placeholder{color:rgba(255,255,255,.22);font-weight:300}
.sw input:focus{border-color:var(--green);background:rgba(255,255,255,.09);box-shadow:0 0 0 3px rgba(26,122,82,.15)}
.si{position:absolute;left:11px;top:50%;transform:translateY(-50%);opacity:.3;font-size:12px;pointer-events:none}
.sb-list{flex:1;overflow-y:auto;padding:8px 0}
.sb-list::-webkit-scrollbar{width:3px}
.sb-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}
.rl{font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.2);padding:14px 18px 5px;font-family:'Outfit',sans-serif}
.ti{display:flex;align-items:center;gap:10px;padding:9px 18px;cursor:pointer;transition:all .15s;border-left:3px solid transparent;margin:1px 0}
.ti:hover{background:var(--sb-h);border-left-color:rgba(255,255,255,.12)}
.ti.active{background:linear-gradient(90deg,rgba(26,122,82,.35) 0%,rgba(26,122,82,.15) 100%);border-left-color:var(--green-l)}
.td{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.12);flex-shrink:0;transition:all .15s}
.ti.active .td{background:var(--green-l);box-shadow:0 0 6px rgba(34,160,107,.5)}
.tn{font-size:12.5px;color:rgba(255,255,255,.5);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:400;transition:color .15s}
.ti.active .tn,.ti:hover .tn{color:rgba(255,255,255,.92)}.ti.active .tn{font-weight:600}
.tc{font-family:'JetBrains Mono',monospace;font-size:9px;color:rgba(255,255,255,.15);margin-left:auto;flex-shrink:0;font-weight:500}
.ti.active .tc{color:rgba(255,255,255,.35)}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-shrink:0;box-shadow:var(--shadow-sm)}
.tit{font-size:17px;font-weight:700;letter-spacing:-.3px}.tsub{font-size:10.5px;color:var(--muted);margin-top:2px;font-weight:400}
.topbar-r{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.df{display:flex;align-items:center;gap:6px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:11.5px;color:var(--muted);transition:border-color .15s}
.df:hover{border-color:var(--green)}
.df input[type=date]{border:none;background:transparent;font-size:11.5px;font-family:'Outfit',sans-serif;color:var(--text);outline:none;cursor:pointer;font-weight:500}
.vtog{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.vb{padding:6px 13px;font-size:11px;font-family:'Outfit',sans-serif;font-weight:500;cursor:pointer;border:none;background:var(--bg);color:var(--muted);transition:all .18s}
.vb.active{background:var(--green);color:#fff;box-shadow:inset 0 1px 2px rgba(0,0,0,.1)}
.vb:hover:not(.active){background:#eef2ef}
.ebtn{padding:6px 14px;font-size:11px;font-family:'Outfit',sans-serif;font-weight:600;cursor:pointer;border:none;background:var(--green);color:#fff;border-radius:8px;transition:all .15s;box-shadow:0 1px 3px rgba(26,122,82,.2)}
.ebtn:hover{background:var(--green-l);transform:translateY(-1px);box-shadow:0 3px 8px rgba(26,122,82,.25)}
.ebtn:active{transform:translateY(0)}

.content{flex:1;overflow:auto;padding:20px 24px}
.content::-webkit-scrollbar{width:6px;height:6px}
.content::-webkit-scrollbar-thumb{background:#c5cfc9;border-radius:3px}
.content::-webkit-scrollbar-thumb:hover{background:#a0b0a6}

.ph{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;opacity:.35}
.ph-i{font-size:48px}.ph-t{font-size:14px;color:var(--muted);font-weight:400}

/* ── SUMMARY CARDS ── */
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:20px}
.sc{background:#fff;border-radius:var(--radius);padding:14px 16px;border:1px solid var(--border);box-shadow:var(--shadow-sm);transition:all .18s;position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--radius) var(--radius) 0 0}
.sc.hl::before{background:var(--green)}.sc.rn::before{background:var(--purple)}.sc.rnd::before{background:var(--indigo)}
.sc.hdom::before{background:var(--cyan)}.sc.hfes::before{background:var(--accent)}.sc.hexor::before{background:var(--red)}.sc.hexdf::before{background:var(--pink)}
.sc:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.sl{font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);font-weight:600;margin-bottom:4px}
.sv{font-size:22px;font-weight:700;font-family:'JetBrains Mono',monospace}
.sc.hl .sv{color:var(--green)}.sc.rn .sv{color:var(--purple)}.sc.rnd .sv{color:var(--indigo)}
.sc.hdom .sv{color:var(--cyan)}.sc.hfes .sv{color:var(--accent)}.sc.hexor .sv{color:var(--red)}.sc.hexdf .sv{color:var(--pink)}

/* ── TABLE ── */
.tw{border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--border);overflow-x:auto;box-shadow:var(--shadow-sm);background:#fff}
table.t{width:100%;border-collapse:collapse;font-size:11.5px;min-width:500px}
table.t th{background:#f8faf9;border-bottom:1px solid var(--border);padding:7px 9px;text-align:center;font-weight:600;font-size:9.5px;color:var(--muted);white-space:nowrap;letter-spacing:.3px}
table.t th.s0{position:sticky;left:0;z-index:3;background:#f8faf9;text-align:left;min-width:46px}
table.t th.s1{position:sticky;left:46px;z-index:3;background:#f8faf9;text-align:left;min-width:52px}
table.t th.eh{background:linear-gradient(135deg,var(--green-xl) 0%,#d4f0e2 100%);color:var(--green-d);border-left:2px solid var(--green);font-size:10.5px;font-weight:700;cursor:text}
table.t td{padding:4px 8px;border-bottom:1px solid #eef2ef;text-align:center;white-space:nowrap;vertical-align:middle;transition:background .1s}
table.t td.s0{position:sticky;left:0;background:#fff;z-index:1;font-weight:600;font-size:10px;color:var(--muted);width:46px;text-align:left}
table.t td.s1{position:sticky;left:46px;background:#fff;z-index:1;width:52px;text-align:left;font-weight:500;font-size:11px}
table.t tr:hover td{background:#f4f8f6}
table.t tr:hover td.s0,table.t tr:hover td.s1{background:#f4f8f6}
tr.dom td{background:#fffef5}
tr.dom td.s0,tr.dom td.s1{background:#fffef5}
tr.dom:hover td{background:#fffbe0}
tr.fest td{background:#fff9e6}
tr.wsub td{background:linear-gradient(90deg,#edf8f2 0%,#f4fbf7 100%);font-weight:700;color:var(--green-d);font-size:11.5px;border-top:2px solid #b2dfc8;border-bottom:1px solid var(--border)}
tr.wsub td.s0,tr.wsub td.s1{background:#edf8f2;color:var(--green-d)}
tr.wsub:hover td{background:#e2f4eb}
tr.fest td.s0,tr.fest td.s1{background:#fff9e6}
tr.fest:hover td{background:#fff3c4}
.fest-badge{display:inline-block;background:linear-gradient(135deg,#f5a623,#e8972f);color:#fff;font-size:8px;font-weight:700;padding:2px 5px;border-radius:4px;margin-left:4px;vertical-align:middle;box-shadow:0 1px 2px rgba(245,166,35,.3);letter-spacing:.3px}
.wsub-label{font-size:9px;color:var(--green);font-weight:700}
tr.ws td{background:linear-gradient(90deg,#e8f5ee 0%,#f0f9f4 100%);font-weight:700;color:var(--green-d);font-size:11px}
tr.ws td.s0,tr.ws td.s1{background:#e8f5ee;color:var(--green-d)}
tr.ws:hover td{background:#ddf1e6}
tr.tot td{background:linear-gradient(90deg,var(--green-d) 0%,#1a7a52 100%);color:#fff;font-weight:700;padding:8px 8px;font-size:13px}
tr.tot td.s0,tr.tot td.s1{background:var(--green-d);color:#fff;font-size:13px}

/* ── EDITABLE TIME ── */
.te{display:inline-block;min-width:36px;padding:2px 4px;border-radius:5px;font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:500;cursor:text;transition:all .15s;text-align:center;color:var(--text)}
.te:hover{background:rgba(26,122,82,.08)}.te:focus{outline:2px solid var(--green);outline-offset:1px;background:#fff}
.te.empty{color:#ccc}
.time-cell{display:inline-flex;align-items:center;gap:3px;cursor:pointer;border-radius:6px;padding:3px 8px;transition:all .15s;font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:500;color:var(--text);min-width:85px;justify-content:center}
.time-cell:hover{background:rgba(26,122,82,.08);box-shadow:0 0 0 1px rgba(26,122,82,.15)}
.time-cell.empty{color:#bbb;font-size:10.5px;font-family:'Outfit',sans-serif;font-weight:400}
.tc-arr{color:var(--green);font-size:9px;margin:0 2px;opacity:.5}
.time-popup{position:fixed;z-index:9998;background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);padding:16px;display:flex;flex-direction:column;gap:12px;animation:popIn .2s cubic-bezier(.34,1.56,.64,1);min-width:200px}
.tp-row{display:flex;align-items:center;gap:10px}
.tp-lbl{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;width:52px;flex-shrink:0}
.tp-input{flex:1;border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:14px;font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--text);outline:none;cursor:pointer;transition:border-color .15s}
.tp-input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(26,122,82,.1)}
.tp-btns{display:flex;gap:8px}
.tp-ok{flex:1;background:var(--green);color:#fff;border:none;border-radius:8px;padding:10px;font-size:12.5px;font-family:'Outfit',sans-serif;font-weight:700;cursor:pointer;transition:all .15s}
.tp-ok:hover{background:var(--green-l);transform:translateY(-1px)}
.tp-clr{background:#f5f5f5;color:var(--muted);border:none;border-radius:8px;padding:10px 12px;font-size:12px;font-family:'Outfit',sans-serif;cursor:pointer;transition:all .15s;font-weight:500}
.tp-clr:hover{background:#ffe5e5;color:var(--red)}

/* ── CALC CELLS ── */
.calc-cell{display:inline-block;width:30px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;text-align:center;color:var(--text);cursor:default}
.ne{display:inline-block;width:30px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;text-align:center}
/* Special pill */
.sp{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.sp:hover{filter:brightness(.93);transform:scale(1.03)}
/* Nov button */
.nb{font-size:9px;margin-left:4px;opacity:.3;cursor:pointer;border-radius:4px;padding:2px 5px;color:var(--muted);transition:all .15s}
.nb:hover{background:rgba(26,122,82,.1);opacity:1;color:var(--green)}
/* Sched cell wrapper */
.sc2{display:flex;align-items:center;gap:3px;justify-content:center;min-width:100px;border-radius:6px;padding:2px 4px;transition:background .12s}
.sc2:hover{background:rgba(26,122,82,.04)}

/* ── DROPDOWN ── */
.dm{position:fixed;z-index:9999;background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);min-width:180px;overflow:hidden;animation:popIn .2s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{from{opacity:0;transform:translateY(-6px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes mIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.dms{padding:6px 0}.dms+.dms{border-top:1px solid var(--border)}
.dml{font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding:6px 14px 3px}
.dmi{display:flex;align-items:center;padding:8px 14px;cursor:pointer;font-size:12px;transition:all .12s;border-radius:6px;margin:1px 4px}
.dmi:hover{background:#f0f7f3}
.dmi .mn{font-weight:500;color:var(--text)}
.dmi.act .mn{color:var(--green);font-weight:700}
.dmi.act::after{content:'✓';margin-left:auto;color:var(--green);font-weight:700}
.dcl{padding:8px 14px;color:var(--red);font-size:11.5px;cursor:pointer;transition:background .12s;font-weight:500}
.dcl:hover{background:#fff5f5}

.c-hl{color:var(--green)}.c-rn{color:var(--purple)}.c-rnd{color:var(--indigo)}
.c-hdom{color:var(--cyan)}.c-hfes{color:var(--accent)}.c-hexor{color:var(--red)}.c-hexdf{color:var(--pink)}
.dash{color:#ddd}
.ediv{border-left:2px solid var(--green-xl)}

/* ── EMP VIEW ── */
.ecg{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px}
.ec{background:#fff;border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow-sm);transition:all .2s}
.ec:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.ech{background:linear-gradient(135deg,var(--green-xl) 0%,#d4f0e2 100%);padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.eav{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--green) 0%,var(--green-l) 100%);color:#fff;font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 6px rgba(26,122,82,.25)}
.ecn{font-size:13px;font-weight:700;color:var(--green-d);letter-spacing:-.2px}.ecr{font-size:9.5px;color:var(--muted);font-weight:400}
.ekp{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border)}
.ek{background:#fff;padding:10px 6px;text-align:center}
.ekl{font-size:8px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:600;margin-bottom:2px}
.ekv{font-size:16px;font-weight:700;font-family:'JetBrains Mono',monospace}
.edays{padding:10px 16px;max-height:260px;overflow-y:auto}
.edr{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid #f2f5f3;font-size:11px}
.edr:last-child{border-bottom:none}
.edl{width:30px;font-weight:600;color:var(--muted);flex-shrink:0;font-size:10px}
.edd{width:48px;color:var(--muted);flex-shrink:0;font-size:10px}
.eds{font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:500;flex:1}
.bgs{display:flex;gap:4px;flex-wrap:wrap}
.bg{font-size:8.5px;font-family:'JetBrains Mono',monospace;padding:2px 5px;border-radius:4px;font-weight:600}
.bg.rn{background:#f3eeff;color:var(--purple)}.bg.rnd{background:#eeeffe;color:var(--indigo)}
.bg.hdom{background:#e0f6fc;color:var(--cyan)}.bg.hfes{background:#fff7e0;color:#92570a}
.bg.hexor{background:#ffe5e5;color:var(--red)}.bg.hexdf{background:#fce7f3;color:var(--pink)}

.hint{font-size:10px;color:var(--muted);padding:8px 0 4px;font-weight:400}
.contract-sel{background:rgba(26,122,82,.1);border:1px solid rgba(26,122,82,.2);border-radius:5px;color:var(--green-d);font-size:9.5px;font-weight:600;padding:2px 6px;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .15s}
.contract-sel:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 2px rgba(26,122,82,.12)}
.contract-sel:hover{background:rgba(26,122,82,.15)}
</style>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getFirestore, doc, setDoc, getDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
  apiKey: "AIzaSyAtQRZgEV2fnfqNnhp_mc3haAVo5dSp7Sg",
  authDomain: "boti-malla-horaria.firebaseapp.com",
  projectId: "boti-malla-horaria",
  storageBucket: "boti-malla-horaria.firebasestorage.app",
  messagingSenderId: "267688040315",
  appId: "1:267688040315:web:d2b2f5f09c6bb62d12cfde"
};
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // Expose to global scope
  window._db = db;
  window._firestoreFns = { doc, setDoc, getDoc, onSnapshot };
  window._firebaseReady = true;
  window.dispatchEvent(new Event('firebaseReady'));
</script>
</head>
<body>

<div class="sidebar">
  <div class="sb-head">
    <div class="brand">
      <div class="brand-logo">B</div>
      <div><div class="brand-name">O Boticário</div><div class="brand-sub">Malla Horaria 2026</div></div>
    </div>
    <div class="sw">
      <span class="si">🔍</span>
      <input type="text" id="srch" placeholder="Buscar tienda..." oninput="buildSB(this.value)">
    </div>
  </div>
  <div class="sb-list" id="sbList"></div>
</div>

<div class="main">
  <div class="topbar">
    <div><span id="saveStatus" style="font-size:10px;color:var(--green);margin-right:10px;transition:opacity .5s;opacity:0"></span><div class="tit" id="topT">Selecciona una tienda</div><div class="tsub" id="topS">Malla horaria · Liquidación de horas</div></div>
    <div class="topbar-r">
      <div class="df">📅
        <input type="date" id="dfrom" onchange="render()"> →
        <input type="date" id="dto" onchange="render()">
      </div>
      <div class="vtog">
        <button class="vb active" id="btnM" onclick="setView('malla')">📋 Malla</button>
        <button class="vb" id="btnA" onclick="setView('asesores')">👤 Por asesor</button>
      </div>
      <button class="ebtn" onclick="exportCSV()">⬇ CSV</button>

/* ── CALENDAR UTILS ── */
function isoWeek(d) {
  // Returns ISO week number
  const jan4 = new Date(d.getFullYear(), 0, 4);
  const startOfWeek1 = new Date(jan4);
  startOfWeek1.setDate(jan4.getDate() - (jan4.getDay() || 7) + 1);
  const diff = d - startOfWeek1;
  return Math.floor(diff / (7 * 86400000)) + 1;
}

function dateStr(d) {
  return d.toISOString().slice(0, 10);
}

function parseDateStr(s) {
  const [y, m, d] = s.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function fmtDisplay(s) {
  if (!s) return '';
  const [y, m, d] = s.split('-');
  return `${d}/${m}`;
}

// Build array of weeks between two date strings (inclusive)
// Each week: { weekNum, days: [{date, dayIdx (0=Mon..6=Sun), label}] }
function buildCalendar(fromStr, toStr) {
  const from = parseDateStr(fromStr);
  const to = parseDateStr(toStr);
  const weeks = [];
  let current = new Date(from);

  while (current <= to) {
    const wn = isoWeek(current);
    let week = weeks.find(w => w.weekNum === wn && w.year === current.getFullYear());
    if (!week) {
      week = { weekNum: wn, year: current.getFullYear(), days: [] };
      weeks.push(week);
    }
    const dayIdx = (current.getDay() + 6) % 7; // 0=Mon..6=Sun
    week.days.push({
      date: dateStr(current),
      dayIdx,
      label: DAY_ES[dayIdx],
      isDom: dayIdx === 6,
      isFest: FESTIVOS_2026.has(dateStr(current))
    });
    current.setDate(current.getDate() + 1);
  }
  return weeks;
}

}

/* ── HOUR CALC ── */
function parseTime(s) {
  if (!s || typeof s !== 'string') return null;
  const m = s.trim().match(/^(\d{1,2}):(\d{2})$/);
  if (!m) return null;
  return parseInt(m[1]) * 60 + parseInt(m[2]);
}

function calcHours(ap, ci, dateStr) {
  const a = parseTime(ap), c = parseTime(ci);
  if (a === null || c === null) return null;
  let diffMin = c - a; if (diffMin <= 0) diffMin += 24 * 60;
  const totalHrs = diffMin / 60;

  // Lunch deduction: shifts > 6h → subtract 1h for lunch break
  const hl = totalHrs > 6 ? Math.floor(totalHrs) - 1 : Math.floor(totalHrs);

  const festivo = isFestivo(dateStr);
  const domingo = isDomingo(dateStr);
  const esOrdinario = !festivo && !domingo; // L-S non-festivo

  // Nocturnal: starts at 19:00 (1140 min), ends at 06:00 next day (1800 min = 30*60)
  const se = c <= a ? c + 24 * 60 : c; // shift end normalized
  const nocStart = 19 * 60; // 19:00
  const nocEnd   = 30 * 60; // 06:00 next day
  const os = Math.max(a, nocStart), oe = Math.min(se, nocEnd);
  const nocHrs = oe > os ? Math.round((oe - os) / 60) : 0;

  // RN = recargo nocturno ordinario (L-S non-festivo, after 19:00)
  // RND = recargo nocturno festivo (dom/festivo, after 19:00)
  const rn  = esOrdinario ? nocHrs : 0;
  const rnd = !esOrdinario ? nocHrs : 0;

  return {
    hl,
    hlOrd: esOrdinario ? hl : 0,
    rn, rnd,
    esDomingo: domingo && !festivo,
    esFestivo: festivo,
  };
}

function getSpecKey(v) {

function n(v) { return v === '' || v === null || v === undefined ? 0 : Number(v) || 0; }

/* ── TOTALS ── */
function calcTotals(tiendaCode, empIdx, df, dt) {
  const tot = {};
  empIdx.forEach(e => { tot[e] = {hl:0,hlOrd:0,rn:0,rnd:0,hdom:0,hfes:0,hexor:0,hexdf:0}; });
  if (!SCHED[tiendaCode]) return tot;
  Object.entries(SCHED[tiendaCode]).forEach(([date, dayData]) => {
    if (date < df || date > dt) return;
    empIdx.forEach(e => {
      const emp = dayData[e];
      if (!emp) return;
      if (getSpecKey(emp.ap)) return;
      const rh = resolvedHours(tiendaCode, e, date);
      tot[e].hl    += n(emp.hl);
      tot[e].hlOrd += n(emp.hlOrd);
      tot[e].rn    += n(emp.rn);  tot[e].rnd += n(emp.rnd);
      tot[e].hdom  += rh.hdom;
      tot[e].hfes  += rh.hfes;
    });
  });
  return tot;
}

function storeTot(tiendaCode, empIdx, df, dt) {
  const et = calcTotals(tiendaCode, empIdx, df, dt);
  const t = {hl:0,rn:0,rnd:0,hdom:0,hfes:0,hexor:0,hexdf:0};
  empIdx.forEach(e => { for (const k of Object.keys(t)) t[k] += et[e][k]; });
  return t;
}

    <div class="dms"><div class="dcl" onclick="clearNov()">Limpiar novedad</div></div>`;

  const rect = e.target.getBoundingClientRect();
  let top = rect.bottom + 4, left = rect.left;
  if (top + 320 > window.innerHeight) top = rect.top - 320 - 4;
  if (left + 175 > window.innerWidth) left = window.innerWidth - 180;
  menu.style.top = top + 'px'; menu.style.left = left + 'px'; menu.style.display = 'block';
}

/* ── CELL BUILD ── */
function buildCellContent(date, empIdx) {
  const emp = getEmp(sel, date, empIdx);
  const sk = getSpecKey(emp.ap);
  if (sk) {
    const style = PILL[sk] || 'background:#f0fdf4;color:#166534';
    return `<span class="sp" style="${style}" onclick="openNovMenu(event,'${date}',${empIdx})">${sk}</span>`;
  }
  const ap = emp.ap || '', ci = emp.ci || '';
  const hasTime = !!(ap && ci);
  const inner = hasTime
    ? `<b>${ap}</b><span class="tc-arr">&#8594;</span><b>${ci}</b>`
    : `+ Agregar horario`;
  return `<span class="time-cell ${hasTime?'':'empty'}" onclick="openTP(event,'${date}',${empIdx})">${inner}</span>
    <span class="nb" onclick="openNovMenu(event,'${date}',${empIdx})">&#8801;</span>`;
}

function refreshCell(date, empIdx) {
  const cell = document.querySelector(`.sc2[data-date="${date}"][data-emp="${empIdx}"]`);
  if (cell) cell.innerHTML = buildCellContent(date, empIdx);
  // refresh number cells
  const emp = getEmp(sel, date, empIdx);
  const sk = getSpecKey(emp.ap);
  ['hl','rn','rnd','hdom','hfes','hexor','hexdf'].forEach(f => {
    const el = document.querySelector(`.ne[data-date="${date}"][data-emp="${empIdx}"][data-field="${f}"]`);
    if (!el) return;
    if (sk) { el.textContent = '–'; el.style.opacity = '.25'; el.style.pointerEvents = 'none'; }
    else { el.style.opacity = '1'; el.style.pointerEvents = 'auto'; el.textContent = emp[f] || '–'; }
  });
}

/* ── TIME EDIT ── */
function timeKey(e, el) {
  if (e.key === 'Enter') { e.preventDefault(); el.blur(); }
  if (e.key === 'Escape') { el.textContent = el.dataset.orig || '--:--'; el.blur(); }
  if (e.key === 'Tab') { e.preventDefault(); el.blur(); }
}

function commitTime(el) {
  const { date, emp: empIdx, field, orig } = el.dataset;
  let val = el.textContent.trim();
  if (val === '--:--' || val === '') val = '';
  el.dataset.orig = val;
  el.classList.toggle('empty', !val);
  if (!val) el.textContent = '--:--';

  const emp = getEmp(sel, date, parseInt(empIdx));
  emp[field] = val;

  const calc = calcHours(emp.ap, emp.ci, date);
  if (calc) {
    emp.hl      = calc.hl;
    emp.hlOrd   = calc.hlOrd;
    emp.rn      = calc.rn  > 0 ? calc.rn  : '';
    emp.rnd     = calc.rnd > 0 ? calc.rnd : '';
    emp.esDomingo = calc.esDomingo || false;
    emp.esFestivo = calc.esFestivo || false;
    // hdom/hfes resolved weekly — store 0 for now, updated by resolveWeekDomFes
    emp.hdom = calc.esDomingo ? calc.hl : '';  // provisional
    emp.hfes = calc.esFestivo ? calc.hl : '';  // festivo always HFes
    emp.hexor = '';
    emp.hexdf = '';
  } else {
    emp.hl=''; emp.hlOrd=''; emp.rn=''; emp.rnd=''; emp.hdom=''; emp.hfes='';
    emp.esDomingo=false; emp.esFestivo=false; emp.hexor=''; emp.hexdf='';
  }
  // Refresh display cells
  refreshRowCells(date, parseInt(empIdx));
  updateCards();
}

function refreshRowCells(date, empIdx) {
  const emp = getEmp(sel, date, empIdx);
  const sk = getSpecKey(emp.ap);
  const fields = ['hl','rn','rnd','hdom','hfes'];
  fields.forEach(f => {
    const el = document.querySelector(`.calc-cell[data-date="${date}"][data-emp="${empIdx}"][data-field="${f}"]`);
    if (!el) return;
    if (sk) { el.textContent = '–'; }
    else { el.textContent = emp[f] || '–'; }
  });
}

// Check if asesor has Compensatorio in the 6 days AFTER a Sunday (Mon-Sat next week)
function hasCompensatorioNextDays(tiendaCode, empIdx, dateStr) {
  if (!SCHED[tiendaCode]) return false;
  const sunday = parseDateStr(dateStr);
  // Check the 6 days after the sunday (Mon to Sat)
  for (let i = 1; i <= 6; i++) {
    const next = new Date(sunday);
    next.setDate(sunday.getDate() + i);
    const nextStr = next.toISOString().slice(0,10);
    const dayData = SCHED[tiendaCode][nextStr];
    if (!dayData) continue;
    const emp = dayData[empIdx];
    if (emp && getSpecKey(emp.ap) === 'Compensatorio') return true;
  }
  return false;
}

// Resolve final hdom vs hfes:
// Festivo entre semana (L-S) → siempre H.Fest
// Domingo + Compensatorio en los 6 dias SIGUIENTES → Dom+Comp
// Domingo + sin Compensatorio en los 6 dias siguientes → H.Fest
function resolvedHours(tiendaCode, empIdx, dateStr) {
  const emp = getEmp(tiendaCode, dateStr, empIdx);
  if (!emp || !emp.ap || getSpecKey(emp.ap)) return {hdom:0, hfes:0};

  // Festivo entre semana (no domingo) → siempre H.Fest
  if (emp.esFestivo && !emp.esDomingo) return {hdom:0, hfes: emp.hl||0};

  // Domingo trabajado
  if (emp.esDomingo) {
    const hasComp = hasCompensatorioNextDays(tiendaCode, empIdx, dateStr);
    return hasComp ? {hdom: emp.hl||0, hfes:0} : {hdom:0, hfes: emp.hl||0};
  }

  return {hdom:0, hfes:0};
}

function renderMalla(empIdx, df, dt) {
  const calendar = buildCalendar(df, dt);

  // Employee headers — editable names
  const ehRow = empIdx.map(e => {
    const name = getEmpName(sel, e);
    const contract = getContract(sel, e);

      <div style="display:flex;align-items:center;gap:6px;justify-content:center">
        <span contenteditable="true" data-emp="${e}"
          onblur="saveName(this)" onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}"
          style="outline:none;cursor:text">${name}</span>
        <select class="contract-sel" onchange="setContract('${sel}',${e},this.value)" title="Tipo de contrato">
          <option value="44" ${contract===44?'selected':''}>44h</option>
          <option value="33" ${contract===33?'selected':''}>33h</option>
        </select>
      </div>
    </th>`;
  }).join('');

  const subRow = empIdx.map(() => `
    <th class="ediv c-hl" title="Horario del turno">Horario</th>
    <th class="c-hl" title="Horas liquidadas (descontando almuerzo)">HL</th>
    <th class="c-rn" title="Recargo Nocturno Ordinario L-S desde 19:00">RN Ord</th>
    <th class="c-rnd" title="Recargo Nocturno Festivo Dom/Fes desde 19:00">RN Fes</th>
    <th class="c-hdom" title="Domingo con Compensatorio">Dom+Comp</th>
    <th class="c-hfes" title="Horas Festivas (Dom sin comp + Festivos)">H.Fest</th>
    <th class="c-hexor" title="Horas Extras Ordinarias (sobre 44h/33h semanales)">Ex.Ord</th>
    <th class="c-hexdf" title="Horas Extras Festivas">Ex.Fes</th>`).join('');

  let body = '';

  calendar.forEach(week => {
    const wid = `w${week.year}w${week.weekNum}`;
    const wLabel = `S${week.weekNum}`;

    // Week header row — just label + toggle
    const emptyEmpCells = empIdx.map(() => `<td class="ediv" colspan="8"></td>`).join('');
    body += `<tr class="ws" onclick="twk('${wid}')" style="cursor:pointer" id="wrow-${wid}">
      <td class="s0">${wLabel}</td>
      <td class="s1"><span style="font-size:8.5px;opacity:.55" id="ar-${wid}">▼ días</span></td>
      ${emptyEmpCells}</tr>`;

    // Day rows
    week.days.forEach(day => {
      const dayCells = empIdx.map(e => {
        const emp = getEmp(sel, day.date, e);
        const sk = getSpecKey(emp.ap);
        if (sk) {
          return `<td class="ediv" colspan="8" style="text-align:left;padding-left:10px">
            <div class="sc2" data-date="${day.date}" data-emp="${e}">
              ${buildCellContent(day.date, e)}
            </div>
            ${['hl','rn','rnd','hdom','hfes','hexor','hexdf'].map(f=>`<span class="ne" style="display:none" data-date="${day.date}" data-emp="${e}" data-field="${f}" data-orig="" ></span>`).join('')}
          </td>`;
        }
        return `<td class="ediv" style="min-width:110px">
          <div class="sc2" data-date="${day.date}" data-emp="${e}">
            ${buildCellContent(day.date, e)}
          </div>
        </td>
        <td>${neEl(day.date, e, 'hl', 'c-hl')}</td>
        <td>${neEl(day.date, e, 'rn', 'c-rn')}</td>
        <td>${neEl(day.date, e, 'rnd', 'c-rnd')}</td>
        <td>${neEl(day.date, e, 'hdom', 'c-hdom')}</td>
        <td>${neEl(day.date, e, 'hfes', 'c-hfes')}</td>
        <td>${neEl(day.date, e, 'hexor', 'c-hexor')}</td>
        <td>${neEl(day.date, e, 'hexdf', 'c-hexdf')}</td>`;
      }).join('');

      const isFest = isFestivo(day.date);
      const rowClass = isFest ? 'fest' : (day.isDom ? 'dom' : '');
      body += `<tr class="week-${wid} ${rowClass}">
        <td class="s0">${day.label}</td>
        <td class="s1">${fmtDisplay(day.date)}${isFestivo(day.date)?'<span class="fest-badge">F</span>':''}</td>
        ${dayCells}</tr>`;
    });

    // Subtotal row — sum of this week's days
    const wTot = {};
    empIdx.forEach(e => { wTot[e] = {hl:0,hlOrd:0,rn:0,rnd:0,hdom:0,hfes:0,hexor:0,hexdf:0}; });
    week.days.forEach(day => {
      empIdx.forEach(e => {
        const emp = getEmp(sel, day.date, e);
        if (getSpecKey(emp.ap)) return;
        const rh = resolvedHours(sel, e, day.date);
        wTot[e].hl    += n(emp.hl);
        wTot[e].hlOrd += n(emp.hlOrd);
        wTot[e].rn    += n(emp.rn);  wTot[e].rnd += n(emp.rnd);
        wTot[e].hdom  += rh.hdom;
        wTot[e].hfes  += rh.hfes;
      });
    });
    const subCells = empIdx.map(e => {
      const w = wTot[e];
      const threshold = getContract(sel, e); // 33 or 44
      const exor = Math.max(0, (w.hlOrd||0) - threshold);
      return `<td class="ediv"></td>
      <td class="c-hl">${w.hl||'–'}</td><td class="c-rn">${w.rn||'–'}</td><td class="c-rnd">${w.rnd||'–'}</td>
      <td class="c-hdom">${w.hdom||'–'}</td><td class="c-hfes">${w.hfes||'–'}</td>

      <td class="s1" style="font-size:9px;color:var(--muted)">subtotal</td>
      ${subCells}</tr>`;
  });

  // TOTAL row
  const et = calcTotals(sel, empIdx, df, dt);
  // For total ExOr: sum weekly ExOr across all weeks
  // Build weekly totals per emp
  const empWeeklyExor = {};
  empIdx.forEach(e => { empWeeklyExor[e] = 0; });
  calendar.forEach(week => {
    const wt = {};
    empIdx.forEach(e => { wt[e] = {hlOrd:0}; });
    week.days.forEach(day => {
      empIdx.forEach(e => {
        const emp = getEmp(sel, day.date, e);
        if (!getSpecKey(emp.ap)) wt[e].hlOrd += n(emp.hlOrd);
      });
    });
    empIdx.forEach(e => {
      const threshold = getContract(sel, e);
      empWeeklyExor[e] += Math.max(0, wt[e].hlOrd - threshold);
    });
  });

  const totRow = empIdx.map(e => `
    <td class="ediv"></td>
    <td><span class="ne c-hl" id="tot-hl-${e}">${et[e].hl||0}</span></td>
    <td><span class="ne c-rn" id="tot-rn-${e}">${et[e].rn||0}</span></td>
    <td><span class="ne c-rnd" id="tot-rnd-${e}">${et[e].rnd||0}</span></td>
    <td><span class="ne c-hdom" id="tot-hdom-${e}">${et[e].hdom||0}</span></td>
    <td><span class="ne c-hfes" id="tot-hfes-${e}">${et[e].hfes||0}</span></td>
    <td><span class="ne c-hexor" id="tot-hexor-${e}">${empWeeklyExor[e]||0}</span></td>
    <td><span class="ne c-hexdf" id="tot-hexdf-${e}">0</span></td>`).join('');
  body += `<tr class="tot"><td class="s0">TOTAL</td><td class="s1">Tienda</td>${totRow}</tr>`;

  return `<div class="hint">Click en el horario para editar · ≡ para marcar novedad · Click en nombre para renombrar</div>
  <div class="tw"><table class="t">
    <thead>
      <tr><th class="s0" rowspan="2">Sem.</th><th class="s1" rowspan="2">Fecha</th>${ehRow}</tr>
      <tr>${subRow}</tr>
    </thead>
    <tbody>${body}</tbody>
  </table></div>`;
}

function renderEmp(empIdx, df, dt) {
  const et = calcTotals(sel, empIdx, df, dt);
  const calendar = buildCalendar(df, dt);
  const allDays = calendar.flatMap(w => w.days);

  // Calculate weekly ExOr per employee
  const empExor = {};
  empIdx.forEach(e => { empExor[e] = 0; });
  calendar.forEach(week => {
    const wt = {};
    empIdx.forEach(e => { wt[e] = 0; });
    week.days.forEach(day => {
      empIdx.forEach(e => {
        const emp = getEmp(sel, day.date, e);
        if (!getSpecKey(emp.ap)) wt[e] += n(emp.hlOrd);
      });
    });
    empIdx.forEach(e => {
      empExor[e] += Math.max(0, wt[e] - getContract(sel, e));
    });
  });

  return `<div class="ecg">${empIdx.map(e => {
    const name = getEmpName(sel, e);
    const t = et[e];
    const ini = name.split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase();
    const dH = allDays.map(day => {
      const emp = getEmp(sel, day.date, e);
      if (!emp.ap && !emp.hl) return '';
      const sk = getSpecKey(emp.ap);
      const bgs = [
        emp.rn&&n(emp.rn)?`<span class="bg rn">RN:${emp.rn}</span>`:'',
        emp.rnd&&n(emp.rnd)?`<span class="bg rnd">RND:${emp.rnd}</span>`:'',
        emp.hdom&&n(emp.hdom)?`<span class="bg hdom">Dom:${emp.hdom}</span>`:'',
        emp.hfes&&n(emp.hfes)?`<span class="bg hfes">Fes:${emp.hfes}</span>`:'',
        emp.hexor&&n(emp.hexor)?`<span class="bg hexor">ExOr:${emp.hexor}</span>`:'',
        emp.hexdf&&n(emp.hexdf)?`<span class="bg hexdf">ExDF:${emp.hexdf}</span>`:'',
      ].filter(Boolean).join('');
      const sc = sk ? `<span class="eds" style="${PILL[sk]||''};padding:1px 7px;border-radius:10px;font-family:inherit;font-size:9.5px">${sk}</span>`
        : emp.ap && emp.ci ? `<span class="eds">${emp.ap}→${emp.ci}</span>` : '';
      if (!sc && !bgs) return '';
      const festBadge = isFestivo(day.date) ? '<span class="fest-badge">F</span>' : '';
      return `<div class="edr"><span class="edl">${day.label}</span><span class="edd">${fmtDisplay(day.date)}${festBadge}</span>${sc}<div class="bgs">${bgs}</div></div>`;
    }).filter(Boolean).join('');

    return `<div class="ec">
      <div class="ech"><div class="eav">${ini}</div><div><div class="ecn">${name}</div><div class="ecr">Asesor</div></div></div>
      <div class="ekp">
        <div class="ek"><div class="ekl">HL</div><div class="ekv c-hl">${t.hl}</div></div>
        <div class="ek"><div class="ekl">RN Ord</div><div class="ekv c-rn">${t.rn}</div></div>
        <div class="ek"><div class="ekl">RN Fes</div><div class="ekv c-rnd">${t.rnd}</div></div>
        <div class="ek"><div class="ekl">Dom+Comp</div><div class="ekv c-hdom">${t.hdom}</div></div>
        <div class="ek"><div class="ekl">H.Fest</div><div class="ekv c-hfes">${t.hfes}</div></div>
        <div class="ek"><div class="ekl">Ex.Ord</div><div class="ekv c-hexor">${empExor[e]||0}</div></div>
        <div class="ek"><div class="ekl">Ex.Fes</div><div class="ekv c-hexdf">0</div></div>
      </div>
      <div class="edays">${dH||'<div style="padding:12px;color:var(--muted);font-size:10.5px;text-align:center">Sin actividad en el período</div>'}</div>
    </div>`;
  }).join('')}</div>`;
}

function exportCSV() {
  if (!sel) return;
  const ei = activeEmps(sel);
  const df = document.getElementById('dfrom').value, dt = document.getElementById('dto').value;
  const hdr = ['Día','Fecha'];
  ei.forEach(e => {
    const nm = getEmpName(sel, e).replace(/[,;]/g, ' ');
    ['Horario','HL','RN','RND','HDom','HFes','ExOr','ExDF'].forEach(h => hdr.push(`${nm}_${h}`));
  });
  const rows = [hdr.join(',')];
  const cal = buildCalendar(df, dt);
  cal.flatMap(w => w.days).forEach(day => {
    const cols = [day.label, day.date];
    ei.forEach(e => {
      const emp = getEmp(sel, day.date, e);
      const sk = getSpecKey(emp.ap);
      [sk || `${emp.ap||''}→${emp.ci||''}`, sk?'':emp.hl, sk?'':emp.rn, emp.rnd, emp.hdom, emp.hfes, emp.hexor, emp.hexdf]
        .forEach(v => cols.push(String(v || '').replace(/,/g, '')));
    });
    rows.push(cols.join(','));
  });
  const blob = new Blob([rows.join('\n')], {type:'text/csv'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `malla_${CATALOG[sel].name.replace(/\s/g,'_')}.csv`; a.click();
}

  ei.forEach(e => { empWeeklyExor[e] = 0; });
  calendar.forEach(week => {
    const wt = {};
    ei.forEach(e => { wt[e] = 0; });
    week.days.forEach(day => {
      ei.forEach(e => {
        const emp = getEmp(sel, day.date, e);
        if (!getSpecKey(emp.ap)) wt[e] += n(emp.hlOrd);
      });
    });
    ei.forEach(e => { empWeeklyExor[e] += Math.max(0, wt[e] - getContract(sel, e)); });
  });
  const wb = XLSX.utils.book_new();
  const rows = [];
  rows.push([`MALLA HORARIA — ${tienda.name}`]);
  rows.push([`CECO ${sel} · ${tienda.region} · Período: ${fmtDisplay(df)} al ${fmtDisplay(dt)}`]);
  rows.push([`Generado: ${new Date().toLocaleDateString('es-CO')}`]);
  rows.push([]);
  const hdr1 = ['Sem.', 'Día', 'Fecha'];
  ei.forEach(e => { hdr1.push(`${getEmpName(sel, e)} (${getContract(sel, e)}h)`); for (let i = 0; i < 7; i++) hdr1.push(''); });
  rows.push(hdr1);
  const hdr2 = ['', '', ''];
  ei.forEach(() => { hdr2.push('Horario','HL','RN Ord','RN Fes','Dom+Comp','H.Fest','Ex.Ord','Ex.Fes'); });
  rows.push(hdr2);
  const hdrStartRow = 4;
  calendar.forEach(week => {
    const wRow = [`S${week.weekNum}`, '', ''];
    ei.forEach(() => { for (let i = 0; i < 8; i++) wRow.push(''); });
    rows.push(wRow);
    week.days.forEach(day => {
      const festLabel = isFestivo(day.date) ? ' (F)' : '';
      const domLabel = day.isDom ? ' (D)' : '';
      const cols = [`S${week.weekNum}`, day.label, fmtDisplay(day.date) + festLabel + domLabel];
      ei.forEach(e => {
        const emp = getEmp(sel, day.date, e);
        const sk = getSpecKey(emp.ap);
        if (sk) { cols.push(sk, '', '', '', '', '', '', ''); }
        else {
          const horario = (emp.ap && emp.ci) ? `${emp.ap} - ${emp.ci}` : '';
          const rh = resolvedHours(sel, e, day.date);
          cols.push(horario, n(emp.hl)||'', n(emp.rn)||'', n(emp.rnd)||'', rh.hdom||'', rh.hfes||'', '', '');
        }
      });
      rows.push(cols);
    });
    const subRow = ['', '', `Subtotal S${week.weekNum}`];
    const wTot = {};
    ei.forEach(e => { wTot[e] = {hl:0,hlOrd:0,rn:0,rnd:0,hdom:0,hfes:0}; });
    week.days.forEach(day => {
      ei.forEach(e => {
        const emp = getEmp(sel, day.date, e);
        if (getSpecKey(emp.ap)) return;
        const rh = resolvedHours(sel, e, day.date);
        wTot[e].hl += n(emp.hl); wTot[e].hlOrd += n(emp.hlOrd);
        wTot[e].rn += n(emp.rn); wTot[e].rnd += n(emp.rnd);
        wTot[e].hdom += rh.hdom; wTot[e].hfes += rh.hfes;
      });
    });
    ei.forEach(e => {
      const w = wTot[e];
      const exor = Math.max(0, (w.hlOrd || 0) - getContract(sel, e));
      subRow.push('', w.hl||'', w.rn||'', w.rnd||'', w.hdom||'', w.hfes||'', exor||'', '');
    });
    rows.push(subRow);
  });
  const totRow = ['', '', 'TOTAL'];
  ei.forEach(e => { totRow.push('', et[e].hl||0, et[e].rn||0, et[e].rnd||0, et[e].hdom||0, et[e].hfes||0, empWeeklyExor[e]||0, 0); });
  rows.push(totRow);
  const ws = XLSX.utils.aoa_to_sheet(rows);
  const colW = [{wch:6},{wch:5},{wch:14}];
  ei.forEach(() => { colW.push({wch:14},{wch:5},{wch:7},{wch:7},{wch:9},{wch:7},{wch:7},{wch:7}); });
  ws['!cols'] = colW;
  const totalCols = 3 + ei.length * 8;
  ws['!merges'] = [{s:{r:0,c:0},e:{r:0,c:totalCols-1}},{s:{r:1,c:0},e:{r:1,c:totalCols-1}},{s:{r:2,c:0},e:{r:2,c:totalCols-1}}];
  ei.forEach((e, idx) => { const startC = 3 + idx * 8; ws['!merges'].push({s:{r:hdrStartRow,c:startC},e:{r:hdrStartRow,c:startC+7}}); });
  const GREEN_BG={rgb:'1A7A52'},GREEN_DARK={rgb:'0E5C3A'},WHITE_FT={rgb:'FFFFFF'},CREAM_BG={rgb:'FFFEF5'},FEST_BG={rgb:'FFF9E6'},SUB_BG={rgb:'E6F9F0'};
  const BORDER_THIN={style:'thin',color:{rgb:'DFE6E1'}};
  const borders={top:BORDER_THIN,bottom:BORDER_THIN,left:BORDER_THIN,right:BORDER_THIN};
  const range = XLSX.utils.decode_range(ws['!ref']);
  for (let R = range.s.r; R <= range.e.r; R++) {
    for (let C = range.s.c; C <= range.e.c; C++) {
      const addr = XLSX.utils.encode_cell({r:R,c:C});
      if (!ws[addr]) ws[addr] = {v:'',t:'s'};
      if (!ws[addr].s) ws[addr].s = {};
      ws[addr].s.font = {name:'Arial',sz:10};
      ws[addr].s.border = borders;
      ws[addr].s.alignment = {horizontal:'center',vertical:'center'};
      if (R===0){ws[addr].s.font={name:'Arial',sz:14,bold:true,color:WHITE_FT};ws[addr].s.fill={fgColor:GREEN_BG};ws[addr].s.alignment={horizontal:'left',vertical:'center'};}
      else if(R===1){ws[addr].s.font={name:'Arial',sz:10,color:{rgb:'7A9488'}};ws[addr].s.alignment={horizontal:'left'};}
      else if(R===2){ws[addr].s.font={name:'Arial',sz:9,italic:true,color:{rgb:'999999'}};ws[addr].s.alignment={horizontal:'left'};}
      if(R===hdrStartRow&&C>=3){ws[addr].s.font={name:'Arial',sz:11,bold:true,color:WHITE_FT};ws[addr].s.fill={fgColor:GREEN_BG};}
      if(R===hdrStartRow+1){ws[addr].s.font={name:'Arial',sz:9,bold:true,color:{rgb:'7A9488'}};ws[addr].s.fill={fgColor:{rgb:'F8FAF9'}};}
      if(R>hdrStartRow+1){
        const rowData=rows[R];if(!rowData)continue;
        const dateCell=String(rowData[2]||''),dayCell=String(rowData[1]||'');
        if(rowData[0]&&!rowData[1]&&!rowData[2]){ws[addr].s.font={name:'Arial',sz:10,bold:true,color:{rgb:'1A7A52'}};ws[addr].s.fill={fgColor:{rgb:'E8F5EE'}};}
        else if(dateCell.includes('(F)')){ws[addr].s.fill={fgColor:FEST_BG};}
        else if(dateCell.includes('(D)')){ws[addr].s.fill={fgColor:CREAM_BG};}
        else if(dateCell.includes('Subtotal')){ws[addr].s.font={name:'Arial',sz:10,bold:true,color:{rgb:'0E5C3A'}};ws[addr].s.fill={fgColor:SUB_BG};}
        else if(dateCell==='TOTAL'){ws[addr].s.font={name:'Arial',sz:11,bold:true,color:WHITE_FT};ws[addr].s.fill={fgColor:GREEN_DARK};}
      }
    }
  }
  XLSX.utils.book_append_sheet(wb, ws, tienda.name.slice(0,31));
  const sumRows=[];
  sumRows.push([`RESUMEN — ${tienda.name}`]);
  sumRows.push([`Período: ${fmtDisplay(df)} al ${fmtDisplay(dt)}`]);
  sumRows.push([]);
  sumRows.push(['Asesor','Contrato','HL Total','RN Ord','RN Fes','Dom+Comp','H.Fest','Ex.Ord','Ex.Fes']);
  ei.forEach(e=>{sumRows.push([getEmpName(sel,e),`${getContract(sel,e)}h`,et[e].hl||0,et[e].rn||0,et[e].rnd||0,et[e].hdom||0,et[e].hfes||0,empWeeklyExor[e]||0,0]);});
  const st=storeTot(sel,ei,df,dt);const totalExor=ei.reduce((s,e)=>s+empWeeklyExor[e],0);
  sumRows.push(['TOTAL','',st.hl,st.rn,st.rnd,st.hdom,st.hfes,totalExor,0]);
  const ws2=XLSX.utils.aoa_to_sheet(sumRows);
  ws2['!cols']=[{wch:22},{wch:10},{wch:9},{wch:9},{wch:9},{wch:11},{wch:9},{wch:9},{wch:9}];
  ws2['!merges']=[{s:{r:0,c:0},e:{r:0,c:8}},{s:{r:1,c:0},e:{r:1,c:8}}];
  const range2=XLSX.utils.decode_range(ws2['!ref']);
  for(let R=range2.s.r;R<=range2.e.r;R++){for(let C=range2.s.c;C<=range2.e.c;C++){
    const addr=XLSX.utils.encode_cell({r:R,c:C});
    if(!ws2[addr])ws2[addr]={v:'',t:'s'};if(!ws2[addr].s)ws2[addr].s={};
    ws2[addr].s.font={name:'Arial',sz:10};ws2[addr].s.border=borders;ws2[addr].s.alignment={horizontal:'center',vertical:'center'};
    if(R===0){ws2[addr].s.font={name:'Arial',sz:14,bold:true,color:WHITE_FT};ws2[addr].s.fill={fgColor:GREEN_BG};ws2[addr].s.alignment={horizontal:'left'};}
    else if(R===1){ws2[addr].s.font={name:'Arial',sz:10,color:{rgb:'7A9488'}};ws2[addr].s.alignment={horizontal:'left'};}
    else if(R===3){ws2[addr].s.font={name:'Arial',sz:10,bold:true,color:WHITE_FT};ws2[addr].s.fill={fgColor:GREEN_BG};}
    else if(R===range2.e.r){ws2[addr].s.font={name:'Arial',sz:11,bold:true,color:WHITE_FT};ws2[addr].s.fill={fgColor:GREEN_DARK};}
    else if(R>3){ws2[addr].s.fill={fgColor:{rgb:R%2===0?'F8FAF9':'FFFFFF'}};if(C===0)ws2[addr].s.alignment={horizontal:'left'};}
  }}
  XLSX.utils.book_append_sheet(wb,ws2,'Resumen');
  XLSX.writeFile(wb,`Malla_${tienda.name.replace(/\s/g,'_')}_${df}_a_${dt}.xlsx`,{bookSST:true});
}

function openTP(ev, date, empIdx) {
  ev.stopPropagation();
  const emp = getEmp(sel, date, empIdx);
  _tpCtx = { date, empIdx };
  const old = document.getElementById('timePopup');
  if (old) old.remove();
  window._tpJustOpened = true;
  setTimeout(() => { window._tpJustOpened = false; }, 200);
  const apVal = (emp.ap && /^\d/.test(emp.ap)) ? emp.ap : '';
  const ciVal = (emp.ci && /^\d/.test(emp.ci)) ? emp.ci : '';
  const popup = document.createElement('div');
  popup.id = 'timePopup';
  popup.className = 'time-popup';
  popup.innerHTML =
    '<div class="tp-row"><span class="tp-lbl">Entrada</span><input class="tp-input" id="tp-ap" type="time" value="' + apVal + '"></div>' +
    '<div class="tp-row"><span class="tp-lbl">Salida</span><input class="tp-input" id="tp-ci" type="time" value="' + ciVal + '"></div>' +
    '<div class="tp-btns"><button class="tp-clr" onclick="tpClear()">Borrar</button><button class="tp-ok" onclick="tpConfirm()">✓ Confirmar</button></div>';
  document.body.appendChild(popup);
  const rect = ev.currentTarget.getBoundingClientRect();
  let top = rect.bottom + 5, left = rect.left;
  if (top + 175 > window.innerHeight) top = rect.top - 175;
  if (left + 195 > window.innerWidth) left = window.innerWidth - 200;
  popup.style.top = top + 'px';
  popup.style.left = left + 'px';
  const apEl = document.getElementById('tp-ap');
  const ciEl = document.getElementById('tp-ci');
  apEl.addEventListener('change', () => setTimeout(() => ciEl.focus(), 80));
  ciEl.addEventListener('keydown', e => { if (e.key === 'Enter') tpConfirm(); });
  apEl.focus();
}

function tpConfirm() {
  if (!_tpCtx) return;
  const ap = document.getElementById('tp-ap').value || '';
  const ci = document.getElementById('tp-ci').value || '';
  applyTimeEdit(_tpCtx.date, _tpCtx.empIdx, ap, ci);
  tpClose();
}

function tpClear() {
  if (!_tpCtx) return;
  applyTimeEdit(_tpCtx.date, _tpCtx.empIdx, '', '');
  tpClose();
}

function tpClose() {
  const p = document.getElementById('timePopup');
  if (p) p.remove();
  _tpCtx = null;
}

function applyTimeEdit(date, empIdx, ap, ci) {
  const emp = getEmp(sel, date, empIdx);
  emp.ap = ap; emp.ci = ci;
  const calc = (ap && ci) ? calcHours(ap, ci, date) : null;
  if (calc) {
    emp.hl = calc.hl; emp.hlOrd = calc.hlOrd;
    emp.rn = calc.rn > 0 ? calc.rn : '';
    emp.rnd = calc.rnd > 0 ? calc.rnd : '';
    emp.esDomingo = calc.esDomingo || false;
    emp.esFestivo = calc.esFestivo || false;
    emp.hdom = calc.esDomingo ? calc.hl : '';
    emp.hfes = calc.esFestivo ? calc.hl : '';
    emp.hexor = ''; emp.hexdf = '';
  } else {
    emp.hl=''; emp.hlOrd=''; emp.rn=''; emp.rnd=''; emp.hdom=''; emp.hfes='';
    emp.esDomingo=false; emp.esFestivo=false; emp.hexor=''; emp.hexdf='';
  }
  refreshCell(date, empIdx);
  refreshRowCells(date, empIdx);
  refreshSubtotals();
  scheduleSave();
}


function refreshSubtotals() {
  if (!sel || view !== 'malla') return;
  const df = document.getElementById('dfrom').value;
  const dt = document.getElementById('dto').value;
  const ei = activeEmps(sel);
  const calendar = buildCalendar(df, dt);

  calendar.forEach(week => {
    const wid = `w${week.year}w${week.weekNum}`;
    const wsubRow = document.querySelector(`tr.wsub.week-${wid}`);
    if (!wsubRow) return;

    // Recalculate week totals
    const wTot = {};
    ei.forEach(e => { wTot[e] = {hl:0,hlOrd:0,rn:0,rnd:0,hdom:0,hfes:0}; });
    week.days.forEach(day => {
      ei.forEach(e => {
        const emp = getEmp(sel, day.date, e);
        if (getSpecKey(emp.ap)) return;
        const rh = resolvedHours(sel, e, day.date);
        wTot[e].hl    += n(emp.hl);
        wTot[e].hlOrd += n(emp.hlOrd);
        wTot[e].rn    += n(emp.rn);
        wTot[e].rnd   += n(emp.rnd);
        wTot[e].hdom  += rh.hdom;
        wTot[e].hfes  += rh.hfes;
      });
    });

    // Rebuild subtotal cells
    const cells = wsubRow.querySelectorAll('td');
    let cellIdx = 2; // skip Sem + Fecha cols
    ei.forEach(e => {
      const w = wTot[e];
      const threshold = getContract(sel, e);
      const exor = Math.max(0, w.hlOrd - threshold);
      const vals = ['', w.hl||'–', w.rn||'–', w.rnd||'–', w.hdom||'–', w.hfes||'–', exor||'–', '–'];
      vals.forEach((v, i) => {
        if (cells[cellIdx + i]) cells[cellIdx + i].textContent = v;
      });
      cellIdx += 8;
    });
  });

  // Refresh total row
  const df2 = document.getElementById('dfrom').value;
  const dt2 = document.getElementById('dto').value;
  const et = calcTotals(sel, ei, df2, dt2);

  // Recalculate ExOr weekly across all weeks
  const weeklyExor = {};
  ei.forEach(e => { weeklyExor[e] = 0; });
  calendar.forEach(week => {
    const wt = {};
    ei.forEach(e => { wt[e] = {hlOrd:0}; });
    week.days.forEach(day => {
      ei.forEach(e => {
        const emp = getEmp(sel, day.date, e);
        if (!getSpecKey(emp.ap)) wt[e].hlOrd += n(emp.hlOrd);
      });
    });
    ei.forEach(e => {
      weeklyExor[e] += Math.max(0, wt[e].hlOrd - getContract(sel, e));
    });
  });

  ei.forEach(e => {
    const t = et[e];
    const fields = {hl: t.hl, rn: t.rn, rnd: t.rnd, hdom: t.hdom, hfes: t.hfes, hexor: weeklyExor[e]||0, hexdf: 0};
    Object.entries(fields).forEach(([f, v]) => {
      const el = document.getElementById(`tot-${f}-${e}`);
      if (el) el.textContent = v;
    });
  });

  // Update summary cards
  const t = storeTot(sel, ei, df2, dt2);
  const totalExor = ei.reduce((s, e) => s + weeklyExor[e], 0);
  ['hl','rn','rnd','hdom','hfes','hexor','hexdf'].forEach((k, i) => {
    const el = document.getElementById('c-' + k);
    if (el) el.textContent = [t.hl, t.rn, t.rnd, t.hdom, t.hfes, totalExor, 0][i];
  });
}

document.addEventListener('click', e => {
  const m = document.getElementById('dropMenu');
  if (m.style.display !== 'none' && !m.contains(e.target)) closeMenu();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeMenu(); tpClose(); } });

// Recalculate all stored schedule data with current rules
function recalcAll() {
  if (!sel) return;
  if (!confirm('¿Recalcular todas las horas de esta tienda con las reglas actuales? (RN desde 19h, descuento almuerzo, etc.)')) return;
  const tiendaData = SCHED[sel];
  if (!tiendaData) { alert('No hay datos guardados para esta tienda.'); return; }
  let count = 0;
  Object.entries(tiendaData).forEach(([date, dayData]) => {
    Object.entries(dayData).forEach(([empIdx, emp]) => {
      if (!emp || !emp.ap || !emp.ci) return;
      if (getSpecKey(emp.ap)) return; // skip special days
      const calc = calcHours(emp.ap, emp.ci, date);
      if (!calc) return;
      emp.hl    = calc.hl;
      emp.hlOrd = calc.hlOrd;
      emp.rn    = calc.rn  > 0 ? calc.rn  : '';
      emp.rnd   = calc.rnd > 0 ? calc.rnd : '';
      emp.esDomingo = calc.esDomingo || false;
      emp.esFestivo = calc.esFestivo || false;
      emp.hdom  = calc.esDomingo ? calc.hl : '';
      emp.hfes  = calc.esFestivo ? calc.hl : '';
      emp.hexor = ''; emp.hexdf = '';
      count++;
    });
  });
  render();
  scheduleSave();
  alert(`✓ ${count} turnos recalculados con las reglas actuales.`);
}

// ── FIREBASE SYNC ──
let unsubscribe = null;
let saveTimer = null;

function waitFirebase(cb) {
  if (window._firebaseReady) cb();
  else window.addEventListener('firebaseReady', cb, { once: true });
}

// Save to Firestore with debounce (500ms after last edit)
function scheduleSave() {
  if (!sel) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => saveToFirebase(sel), 500);
}

async function saveToFirebase(tiendaCode) {
  if (!window._db) return;
  const { doc, setDoc } = window._firestoreFns;
  const data = SCHED[tiendaCode] || {};
  const empNames = EMP_NAMES[tiendaCode] || {};
  try {
    const contracts = EMP_CONTRACT[tiendaCode] || {};
    await setDoc(doc(window._db, 'malla', String(tiendaCode)), {
      sched: JSON.stringify(data),
      empNames: JSON.stringify(empNames),
      contracts: JSON.stringify(contracts),
      updatedAt: Date.now()
    });
    showSaveStatus('✓ Guardado');
  } catch(e) {
    showSaveStatus('⚠ Error al guardar');
    console.error(e);
  }
}

function showSaveStatus(msg) {
  let el = document.getElementById('saveStatus');
  if (!el) return;
  el.textContent = msg;
  el.style.opacity = '1';
  setTimeout(() => el.style.opacity = '0', 2000);
}

// Subscribe to real-time changes for selected tienda
function subscribeToTienda(tiendaCode) {
  if (unsubscribe) { unsubscribe(); unsubscribe = null; }
  if (!window._db) { waitFirebase(() => subscribeToTienda(tiendaCode)); return; }
  const { doc, onSnapshot } = window._firestoreFns;
  unsubscribe = onSnapshot(doc(window._db, 'malla', String(tiendaCode)), (snap) => {
    if (snap.exists()) {
      const d = snap.data();
      if (d.sched) {
        const incoming = JSON.parse(d.sched);
        // Merge into SCHED without overwriting local pending saves
        if (!SCHED[tiendaCode]) SCHED[tiendaCode] = {};
        Object.assign(SCHED[tiendaCode], incoming);
      }
      if (d.empNames) {
        const names = JSON.parse(d.empNames);
        if (!EMP_NAMES[tiendaCode]) EMP_NAMES[tiendaCode] = {};
        Object.assign(EMP_NAMES[tiendaCode], names);
      }
      if (d.contracts) {
        const ct = JSON.parse(d.contracts);
        if (!EMP_CONTRACT[tiendaCode]) EMP_CONTRACT[tiendaCode] = {};
        Object.assign(EMP_CONTRACT[tiendaCode], ct);
      }
      // Re-render if this is the currently selected tienda
      if (sel == tiendaCode) render();
    }
    showSaveStatus('● En línea');
  }, (err) => {
    showSaveStatus('⚠ Sin conexión');
  });
}

// Hook into selT to subscribe
const _origSelT = selT;
window.selT = function(code) {
  _origSelT(code);
  subscribeToTienda(code);
};

// Hook into updateCards to also save
const _origUpdateCards = updateCards;
window.updateCards = function() {
  _origUpdateCards();
  scheduleSave();
};

// Hook into saveName to also save
const _origSaveName = saveName;
window.saveName = function(el) {
  _origSaveName(el);
  scheduleSave();
};

// Init: if a tienda is already selected, subscribe
waitFirebase(() => {
  showSaveStatus('● En línea');
  if (sel) subscribeToTienda(sel);
});
